<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保险端 - 智慧救援</title>
    <script type="text/javascript" src="https://map.qq.com/api/js?v=2.exp&key=67MBZ-EF6RT-THAX4-VEGBL-7AYMJ-LGBXX"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #0066ff;
            --bg-color: #0a0e1a;
            --card-bg: rgba(16, 28, 48, 0.95);
            --text-color: #e0f7ff;
            --accent-color: #ff6b35;
            --success-color: #00ff88;
            --warning-color: #ffa500;
        }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 50%, #0a0e1a 100%); color: var(--text-color); min-height: 100vh; }
        .app-container { max-width: 430px; margin: 0 auto; position: relative; min-height: 100vh; background: radial-gradient(ellipse at top, rgba(0, 240, 255, 0.1) 0%, transparent 50%); padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 204, 106, 0.1)); padding: 20px; text-align: center; border-bottom: 1px solid rgba(0, 255, 136, 0.3); }
        .header h1 { font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #00ff88, #00cc6a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-subtitle { font-size: 12px; color: #5a6d7e; margin-top: 5px; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(10, 14, 26, 0.95); border-top: 1px solid rgba(0, 240, 255, 0.3); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; text-align: center; }
        
        .photo-upload { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .photo-item { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(99, 102, 241, 0.3); cursor: pointer; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #5a6d7e; cursor: pointer; }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-text { font-size: 11px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-title { font-size: 14px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #000; }
        .btn-success { background: linear-gradient(135deg, var(--success-color), #00cc6a); color: #000; }
        .btn-warning { background: linear-gradient(135deg, var(--warning-color), #ff8c00); color: #000; }
        .btn:active { transform: scale(0.98); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #8a9ba8; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 8px; color: var(--text-color); font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .order-item { background: rgba(16, 28, 48, 0.6); border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(0, 240, 255, 0.1); cursor: pointer; }
        .order-item:active { background: rgba(0, 240, 255, 0.1); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-no { font-size: 13px; font-weight: bold; color: var(--primary-color); }
        .order-status { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(0, 240, 255, 0.2); color: var(--primary-color); }
        .order-status.processing { background: rgba(255, 165, 0, 0.2); color: var(--warning-color); }
        .order-status.completed { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .order-info { font-size: 12px; color: #8a9ba8; line-height: 1.6; }
        .order-info span { color: var(--text-color); }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; }
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: rgba(0, 240, 255, 0.2); }
        .timeline-item { position: relative; padding-bottom: 15px; }
        .timeline-item::before { content: ''; position: absolute; left: -16px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary-color); }
        .timeline-time { font-size: 11px; color: #5a6d7e; }
        .timeline-content { font-size: 13px; color: var(--text-color); margin-top: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loginPage" class="page active">
            <div class="header">
                <h1>🏥 保险端</h1>
                <div class="header-subtitle">保险公司 · 事故拖车申请</div>
            </div>
            <div class="card" style="margin-top: 50px;">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="loginUsername" placeholder="请输入账号" value="insurance001" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" value="123456" />
                </div>
                <button class="btn btn-primary" onclick="insuranceLogin()">登录</button>
                <div style="margin-top:20px;font-size:12px;color:#5a6d7e;">
                    <div>测试账号：</div>
                    <div>insurance001 / 123456 - 人保 - 刘经理</div>
                    <div>insurance002 / 123456 - 平安 - 陈专员</div>
                </div>
            </div>
        </div>
        <div id="orderListPage" class="page" style="display:none;">
            <div class="header">
                <h1>🏥 保险端</h1>
                <div class="header-subtitle" id="userInfo">保险公司 · 事故拖车申请</div>
            </div>
            <div class="card">
                <div class="card-title">📋 订单列表</div>
                <div id="orderList"></div>
            </div>
        </div>
        <div id="orderDetailPage" class="page">
            <div class="header"><h1>订单详情</h1></div>
            <div id="orderDetail"></div>
            <div class="card">
                <div class="card-title">📋 处理时间线</div>
                <div id="orderTimeline" class="timeline"></div>
            </div>
        </div>
        <div id="requestPage" class="page">
            <div class="header"><h1>📝 拖车申请</h1></div>
            <div class="card">
                <div class="form-group">
                    <label>车牌号 *</label>
                    <input type="text" id="vehiclePlate" placeholder="请输入车牌号" />
                </div>
                <div class="form-group">
                    <label>车主姓名 *</label>
                    <input type="text" id="ownerName" placeholder="请输入车主姓名" />
                </div>
                <div class="form-group">
                    <label>车主电话 *</label>
                    <input type="tel" id="ownerPhone" placeholder="请输入车主电话" />
                </div>
                <div class="form-group">
                    <label>保险单号</label>
                    <input type="text" id="insuranceNo" placeholder="请输入保险单号" />
                </div>
                <div class="form-group">
                    <label>保险公司</label>
                    <input type="text" id="insuranceCompany" placeholder="请输入保险公司名称" />
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="isGarage" />
                    <label for="isGarage">是否在地下车库</label>
                </div>
                <div class="form-group">
                    <label>事故地点（地址） *</label>
                    <input type="text" id="accidentLocation" placeholder="请输入详细地址或点击地图选点" readonly>
                    <input type="hidden" id="accidentAddress">
                    <button class="btn btn-primary" onclick="selectLocation()" style="margin-top:8px;width:100%;">📍 地图选点</button>
                </div>
                <div class="form-group">
                    <label>拖车目的地</label>
                    <input type="text" id="destination" placeholder="请输入拖车目的地或点击地图选点" readonly>
                    <input type="hidden" id="destinationCoord">
                    <button class="btn btn-primary" onclick="pickDestination()" style="margin-top:8px;width:100%;">📍 地图选点</button>
                </div>
                <div class="form-group">
                    <label>事故描述</label>
                    <textarea id="description" placeholder="请描述事故情况"></textarea>
                </div>
                <div class="form-group">
                    <label>特殊说明</label>
                    <textarea id="specialNote" placeholder="其他需要说明的事项"></textarea>
                </div>
                <div class="form-group">
                    <label>现场照片/视频</label>
                    <div style="font-size:12px;color:#5a6d7e;margin-bottom:8px;">
                        💡 建议上传事故现场和车辆的 8 个面照片，最多 9 张
                    </div>
                    <input type="file" id="photoFiles" accept="image/*,video/*" multiple />
                    <div class="photo-upload" id="photoPreview"></div>
                </div>
                <button class="btn btn-primary" onclick="submitRequest()">提交申请</button>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('orderListPage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="nav-text">订单</span>
            </div>
            <div class="nav-item" onclick="switchPage('requestPage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span class="nav-text">申请</span>
            </div>
            <div class="nav-item" onclick="insuranceLogout()">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H8c-1.11 0-2 .89-2 2v3h2V5h11v14H8v-3H6v3c0 1.11.89 2 2 2h11c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2z"/></svg>
                <span class="nav-text">退出</span>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        let currentOrder = null;
        let currentUser = null;
        let map = null;
        let uploadedPhotos = [];

        // 自定义提示框
        function showCustomAlert(type, title, message, callback) {
            const alertBox = document.createElement('div');
            alertBox.id = 'customAlert';
            alertBox.className = 'modal active';
            alertBox.innerHTML = `
                <div class="modal-content" style="max-width:360px;text-align:center;padding:25px;">
                    <div style="font-size:48px;margin-bottom:15px;">${type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️'}</div>
                    <div style="font-size:18px;font-weight:bold;color:#6366f1;margin-bottom:10px;">${title}</div>
                    <div style="font-size:14px;color:#8a9ba8;margin-bottom:20px;line-height:1.6;">${message.replace(/\n/g, '<br>')}</div>
                    <button class="btn btn-primary" onclick="this.closest('.modal').remove();${callback ? 'setTimeout(() => {' + callback.toString() + '}, 100);' : ''}" style="width:120px;">确定</button>
                </div>
            `;
            document.body.appendChild(alertBox);
        }

        // 查看照片
        function viewPhoto(src) {
            const photoUrl = src.startsWith('http') ? src : (src.startsWith('/uploads') ? src : `${API_BASE}${src}`);
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `<img src="${photoUrl}" style="max-width:90%;max-height:80vh;border-radius:8px;" onclick="event.stopPropagation()">`;
            document.body.appendChild(modal);
        }

        async function insuranceLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showCustomAlert('warning', '提示', '请输入账号和密码'); return; }
            try {
                const res = await fetch(`${API_BASE}/insurance/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.token) {
                    currentUser = data.user;
                    localStorage.setItem('insuranceToken', data.token);
                    localStorage.setItem('insuranceUser', JSON.stringify(data.user));
                    showOrderList();
                } else {
                    showCustomAlert('error', '登录失败', data.error || '账号或密码错误');
                }
            } catch (error) {
                showCustomAlert('error', '错误', '登录失败，请重试');
            }
        }

        function showOrderList() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('orderListPage').style.display = 'block';
            document.getElementById('userInfo').textContent = `${currentUser.name} | ${currentUser.company}`;
            initMockData();
            loadOrders();
        }

        async function initMockData() {
            try { await fetch(`${API_BASE}/insurance/init-mock`, { method: 'POST' }); }
            catch (error) { console.error('初始化模拟数据失败:', error); }
        }

        function insuranceLogout() {
            localStorage.removeItem('insuranceToken');
            localStorage.removeItem('insuranceUser');
            location.reload();
        }

        window.onload = function() {
            const token = localStorage.getItem('insuranceToken');
            const user = localStorage.getItem('insuranceUser');
            if (token && user) {
                currentUser = JSON.parse(user);
                showOrderList();
            }
        };

        function switchPage(pageId) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('orderListPage').style.display = 'none';
            document.getElementById('orderDetailPage').style.display = 'none';
            document.getElementById('requestPage').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (pageId === 'orderListPage') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                loadOrders();
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch(`${API_BASE}/insurance/orders`);
                const data = await res.json();
                const orderList = document.getElementById('orderList');
                if (data.orders.length === 0) {
                    orderList.innerHTML = '<div style="text-align:center;color:#5a6d7e;padding:20px;">暂无订单</div>';
                    return;
                }
                orderList.innerHTML = data.orders.map(order => `
                    <div class="order-item" onclick="loadOrderDetail(${order.id})">
                        <div class="order-header">
                            <span class="order-no">${order.order_no}</span>
                            <span class="order-status ${order.status}">${order.status_text}</span>
                        </div>
                        <div class="order-info">
                            车牌：<span>${order.vehicle_plate}</span><br/>
                            ${order.is_garage ? '<span style="color:var(--warning-color)">🅿️ 地库</span><br/>' : ''}
                            地点：<span>${order.current_location}</span><br/>
                            目的地：<span>${order.destination || '未填写'}</span><br/>
                            司机：<span>${order.driver_name || '待分配'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载订单失败:', error);
            }
        }

        async function loadOrderDetail(orderId) {
            try {
                const res = await fetch(`${API_BASE}/insurance/orders/${orderId}`);
                const data = await res.json();
                currentOrder = data.order;
                const order = data.order;
                document.getElementById('orderDetail').innerHTML = `
                    <div class="card">
                        <div class="card-title">📋 订单信息</div>
                        <div style="font-size:13px;line-height:1.8;">
                            <div>订单号：<span style="color:var(--primary-color)">${order.order_no}</span></div>
                            <div>状态：<span>${order.status === 'pending' ? '待审核' : order.status === 'processing' ? '处理中' : order.status === 'completed' ? '已完成' : '已取消'}</span></div>
                            <div>车牌号：<span>${order.vehicle_plate}</span></div>
                            <div>车主：<span>${order.owner_name || '未填写'} (${order.owner_phone})</span></div>
                            <div>是否地库：<span>${order.is_garage ? '✅ 是' : '❌ 否'}</span></div>
                            <div>事故地点：<span>${order.current_location}</span></div>
                            <div>目的地：<span>${order.destination || '未填写'}</span></div>
                            ${order.insurance_no ? `<div>保险单号：<span>${order.insurance_no}</span></div>` : ''}
                            ${order.insurance_company ? `<div>保险公司：<span>${order.insurance_company}</span></div>` : ''}
                            ${order.description ? `<div>描述：<span>${order.description}</span></div>` : ''}
                            ${order.special_note ? `<div>备注：<span>${order.special_note}</span></div>` : ''}
                            ${order.driver ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,240,255,0.2)"><div>司机：<strong>${order.driver.name}</strong></div><div>电话：<strong>${order.driver.phone}</strong></div></div>` : ''}
                        </div>
                    </div>
                    
                    <div class="card" id="routeCard" style="display:none;">
                        <div class="card-title">🚗 拖车路线</div>
                        <div id="routeMap" style="width:100%;height:300px;border-radius:8px;margin-bottom:10px;"></div>
                        <div id="routeInfo" style="font-size:13px;color:#8a9ba8;line-height:1.8;">🔄 正在加载地图...</div>
                    </div>
                    
                    ${order.photos && order.photos.length > 0 ? `
                        <div class="card">
                            <div class="card-title">📸 现场照片 (${order.photos.length}张)</div>
                            <div class="photo-upload">
                                ${order.photos.map(p => {
                                    const photoUrl = p.startsWith('http') ? p : (p.startsWith('/uploads') ? p : `${API_BASE}${p}`);
                                    return `<img class="photo-item" src="${photoUrl}" onclick="viewPhoto('${photoUrl}')"/>`;
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;
                document.getElementById('orderTimeline').innerHTML = order.timeline.map(t => `
                    <div class="timeline-item">
                        <div class="timeline-time">${t.time}</div>
                        <div class="timeline-content">${t.content}</div>
                    </div>
                `).join('');
                
                // 加载路线信息（从事故地点到目的地）
                loadRouteInfo(order);
                
                // 确保页面切换在数据加载完成后执行
                setTimeout(() => {
                    switchPage('orderDetailPage');
                }, 100);
            } catch (error) {
                console.error('加载订单详情错误:', error);
                showCustomAlert('error', '错误', '加载订单详情失败');
            }
        }

        async function submitRequest() {
            const vehicle_plate = document.getElementById('vehiclePlate').value;
            const owner_name = document.getElementById('ownerName').value;
            const owner_phone = document.getElementById('ownerPhone').value;
            const insurance_no = document.getElementById('insuranceNo').value;
            const insurance_company = document.getElementById('insuranceCompany').value;
            const is_garage = document.getElementById('isGarage').checked;
            const accident_location = document.getElementById('accidentLocation').value;
            const accident_address = document.getElementById('accidentAddress').value;
            const destination = document.getElementById('destination').value;
            const description = document.getElementById('description').value;
            const special_note = document.getElementById('specialNote').value;

            if (!vehicle_plate || !owner_name || !owner_phone || !accident_location) {
                showCustomAlert('warning', '提示', '请填写必填信息');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/insurance/tow-request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vehicle_plate, owner_name, owner_phone, insurance_no, insurance_company,
                        is_garage, accident_location, accident_address, destination, 
                        destination_coord: document.getElementById('destinationCoord').value,
                        description, special_note, photos: uploadedPhotos
                    })
                });
                const data = await res.json();
                showCustomAlert('success', '提交成功', data.message || '申请已提交', () => {
                    if (data.orderId) {
                        // 清空表单
                        document.getElementById('vehiclePlate').value = '';
                        document.getElementById('ownerName').value = '';
                        document.getElementById('ownerPhone').value = '';
                        document.getElementById('insuranceNo').value = '';
                        document.getElementById('insuranceCompany').value = '';
                        document.getElementById('accidentLocation').value = '';
                        document.getElementById('accidentAddress').value = '';
                        document.getElementById('destination').value = '';
                        document.getElementById('description').value = '';
                        document.getElementById('specialNote').value = '';
                        document.getElementById('isGarage').checked = false;
                        uploadedPhotos = [];
                        document.getElementById('photoPreview').innerHTML = '';
                        
                        // 跳转到订单详情页
                        loadOrderDetail(data.orderId);
                    }
                });
            } catch (error) {
                showCustomAlert('error', '错误', '提交失败，请重试');
            }
        }

        let selectedLatLng = null;
        let marker = null;
        let selectedAddress = '';

        function selectLocation() {
            const modal = document.createElement('div');
            modal.id = 'locationModal';
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:90%;width:400px;">
                    <div class="modal-title">📍 地图选点</div>
                    <div style="font-size:12px;color:#8a9ba8;margin-bottom:10px;">点击地图选择位置，或自动获取当前位置</div>
                    <div id="mapContainer" style="width:100%;height:450px;border-radius:8px;"></div>
                    <div id="selectedInfo" style="font-size:14px;color:var(--primary-color);margin:10px 0;font-weight:bold;min-height:40px;">🔄 正在定位...</div>
                    <div style="font-size:12px;color:#5a6d7e;margin:5px 0;">📍 坐标：<span id="coordInfo">-</span></div>
                    <button class="btn btn-primary" onclick="confirmLocation()" style="margin-top:10px;">确认选择</button>
                    <button class="btn btn-warning" onclick="closeLocationModal()" style="margin-top:10px;">取消</button>
                </div>
            `;
            document.body.appendChild(modal);

            setTimeout(() => {
                map = new qq.maps.Map(document.getElementById('mapContainer'), {
                    zoom: 15,
                    center: new qq.maps.LatLng(39.9042, 116.4074)
                });

                // 获取地址函数（调用后端 Web Service API）
                async function fetchAddress(lat, lng) {
                    document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                    try {
                        const res = await fetch('/api/insurance/geocode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lat, lng })
                        });
                        const data = await res.json();
                        if (data.success && data.address) {
                            selectedAddress = data.address;
                            document.getElementById('selectedInfo').textContent = `📍 ${selectedAddress}`;
                            console.log('✅ 地址:', selectedAddress);
                        } else {
                            document.getElementById('selectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                        }
                    } catch (error) {
                        console.log('获取地址失败:', error);
                        document.getElementById('selectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    }
                }

                // 获取当前位置（HTTPS 下可用）
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            const center = new qq.maps.LatLng(lat, lng);
                            map.setCenter(center);
                            map.setZoom(16);
                            
                            marker = new qq.maps.Marker({
                                position: center,
                                map: map
                            });
                            
                            selectedLatLng = { lat, lng };
                            document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                            document.getElementById('coordInfo').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                            
                            // 调用 Web Service API 获取地址
                            fetchAddress(lat, lng);
                        },
                        (error) => {
                            console.log('GPS 定位失败:', error.message);
                            document.getElementById('selectedInfo').textContent = '💡 请在地图上点击选择位置';
                        }
                    );
                } else {
                    document.getElementById('selectedInfo').textContent = '💡 请在地图上点击选择位置';
                }

                // 点击地图选点
                qq.maps.event.addListener(map, 'click', function(event) {
                    const latLng = event.latLng;
                    
                    if (marker) marker.setMap(null);
                    
                    marker = new qq.maps.Marker({
                        position: latLng,
                        map: map
                    });
                    
                    selectedLatLng = { lat: latLng.getLat(), lng: latLng.getLng() };
                    selectedAddress = '';
                    document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                    document.getElementById('coordInfo').textContent = `${latLng.getLat().toFixed(6)}, ${latLng.getLng().toFixed(6)}`;
                    
                    // 调用 Web Service API 获取地址
                    fetchAddress(latLng.getLat(), latLng.getLng());
                });
            }, 100);
        }

        function confirmLocation() {
            if (!selectedLatLng) { showCustomAlert('warning', '提示', '请先选择位置'); return; }
            document.getElementById('accidentAddress').value = `${selectedLatLng.lat},${selectedLatLng.lng}`;
            document.getElementById('accidentLocation').value = selectedAddress || '已选择位置';
            closeLocationModal();
        }

        function closeLocationModal() {
            const modal = document.getElementById('locationModal');
            if (modal) modal.remove();
            map = null; selectedLatLng = null; selectedAddress = ''; marker = null;
        }

        // 目的地地图选点
        let destMap = null;
        let destMarker = null;
        let destSelectedLatLng = null;
        let destSelectedAddress = '';

        async function pickDestination() {
            const modal = document.createElement('div');
            modal.id = 'destLocationModal';
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:90%;width:400px;position:relative;z-index:10001;">
                    <div class="modal-title">📍 选择目的地</div>
                    <div style="font-size:12px;color:#8a9ba8;margin-bottom:10px;">点击地图选择目的地</div>
                    <div id="destMapContainer" style="width:100%;height:450px;border-radius:8px;position:relative;z-index:1;"></div>
                    <div id="destSelectedInfo" style="font-size:14px;color:#6366f1;margin:10px 0;font-weight:bold;min-height:40px;">💡 请在地图上点击选择位置</div>
                    <button class="btn btn-primary" onclick="confirmDestination()" style="margin-top:10px;">确认选择</button>
                    <button class="btn btn-warning" onclick="closeDestLocationModal()" style="margin-top:10px;">取消</button>
                </div>
            `;
            document.body.appendChild(modal);

            setTimeout(() => {
                destMap = new qq.maps.Map(document.getElementById('destMapContainer'), {
                    zoom: 15,
                    center: new qq.maps.LatLng(39.9042, 116.4074)
                });

                async function fetchAddress(lat, lng) {
                    document.getElementById('destSelectedInfo').textContent = '🔄 正在获取地址...';
                    try {
                        const res = await fetch('/api/insurance/geocode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lat, lng })
                        });
                        const data = await res.json();
                        if (data.success && data.address) {
                            destSelectedAddress = data.address;
                            document.getElementById('destSelectedInfo').textContent = `📍 ${destSelectedAddress}`;
                        } else {
                            document.getElementById('destSelectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                        }
                    } catch (error) {
                        console.log('获取地址失败:', error);
                        document.getElementById('destSelectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    }
                }

                qq.maps.event.addListener(destMap, 'click', function(event) {
                    const latLng = event.latLng;
                    
                    if (destMarker) destMarker.setMap(null);
                    
                    destMarker = new qq.maps.Marker({
                        position: latLng,
                        map: destMap
                    });
                    
                    destSelectedLatLng = { lat: latLng.getLat(), lng: latLng.getLng() };
                    destSelectedAddress = '';
                    document.getElementById('destSelectedInfo').textContent = '🔄 正在获取地址...';
                    
                    fetchAddress(latLng.getLat(), latLng.getLng());
                });
            }, 100);
        }

        function confirmDestination() {
            if (!destSelectedLatLng) { showCustomAlert('warning', '提示', '请先选择位置'); return; }
            document.getElementById('destination').value = destSelectedAddress || '已选择目的地';
            document.getElementById('destinationCoord').value = `${destSelectedLatLng.lat},${destSelectedLatLng.lng}`;
            closeDestLocationModal();
        }

        function closeDestLocationModal() {
            const modal = document.getElementById('destLocationModal');
            if (modal) modal.remove();
            destMap = null; destSelectedLatLng = null; destSelectedAddress = ''; destMarker = null;
        }

        // 照片预览和上传
        document.getElementById('photoFiles')?.addEventListener('change', async function(e) {
            const files = e.target.files;
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = '';
            uploadedPhotos = [];
            
            if (files.length === 0) return;
            
            const formData = new FormData();
            for (let i = 0; i < Math.min(files.length, 9); i++) {
                formData.append('files', files[i]);
            }
            
            try {
                const res = await fetch(`${API_BASE}/insurance/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success && data.urls && data.urls.length > 0) {
                    uploadedPhotos = data.urls;
                    
                    for (let i = 0; i < Math.min(files.length, 9); i++) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.className = 'photo-item';
                            img.src = e.target.result;
                            img.onclick = () => viewPhoto(e.target.result);
                            preview.appendChild(img);
                        };
                        reader.readAsDataURL(files[i]);
                    }
                    
                    showCustomAlert('success', '上传成功', `已上传 ${uploadedPhotos.length} 张照片`);
                } else {
                    showCustomAlert('error', '上传失败', data.error || '请重试');
                }
            } catch (error) {
                console.error('上传失败:', error);
                showCustomAlert('error', '上传失败', '网络错误，请重试');
            }
        });

        // 加载路线信息（从事故地点到目的地）
        let routeMap = null;
        let routeMarkerFrom = null;
        let routeMarkerTo = null;
        let routePolyline = null;

        async function loadRouteInfo(order) {
            const routeCard = document.getElementById('routeCard');
            const routeInfo = document.getElementById('routeInfo');
            const routeMapContainer = document.getElementById('routeMap');
            
            routeCard.style.display = 'block';
            
            try {
                // 解析事故地点坐标（从 found_address 字段）
                const fromCoordStr = order.found_address || order.address || '';
                let fromCoord = null;
                
                if (fromCoordStr && fromCoordStr.includes(',')) {
                    const parts = fromCoordStr.split(',');
                    fromCoord = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
                }
                
                // 解析目的地坐标（从 destination_coord 字段）
                const toCoordStr = order.destination_coord || '';
                let toCoord = null;
                
                if (toCoordStr && toCoordStr.includes(',')) {
                    const parts = toCoordStr.split(',');
                    toCoord = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
                }
                
                if (!fromCoord || !toCoord) {
                    routeInfo.innerHTML = '⚠️ 无法获取位置坐标';
                    return;
                }
                
                routeMap = new qq.maps.Map(routeMapContainer, {
                    center: new qq.maps.LatLng(fromCoord.lat, fromCoord.lng),
                    zoom: 12
                });
                
                routeMarkerFrom = new qq.maps.Marker({
                    position: new qq.maps.LatLng(fromCoord.lat, fromCoord.lng),
                    map: routeMap,
                    title: '事故地点'
                });
                
                routeMarkerTo = new qq.maps.Marker({
                    position: new qq.maps.LatLng(toCoord.lat, toCoord.lng),
                    map: routeMap,
                    title: '目的地'
                });
                
                const routeRes = await fetch(`${API_BASE}/traffic/calculate-route`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: fromCoord,
                        to: toCoord
                    })
                });
                const routeData = await routeRes.json();
                
                if (routeData.success && routeData.polyline) {
                    const polyPoints = [];
                    const points = routeData.polyline.split(';');
                    points.forEach(point => {
                        const coords = point.split(',');
                        if (coords.length === 2) {
                            polyPoints.push(new qq.maps.LatLng(parseFloat(coords[0]), parseFloat(coords[1])));
                        }
                    });
                    
                    if (polyPoints.length > 0) {
                        routePolyline = new qq.maps.Polyline({
                            map: routeMap,
                            path: polyPoints,
                            strokeColor: '#6366f1',
                            strokeWeight: 5,
                            strokeOpacity: 0.8
                        });
                        
                        const bounds = new qq.maps.LatLngBounds();
                        bounds.extend(new qq.maps.LatLng(fromCoord.lat, fromCoord.lng));
                        bounds.extend(new qq.maps.LatLng(toCoord.lat, toCoord.lng));
                        polyPoints.forEach(p => bounds.extend(p));
                        routeMap.fitBounds(bounds);
                    }
                    
                    routeInfo.innerHTML = `
                        <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(99,102,241,0.1);border-radius:8px;margin-bottom:8px;">
                            <span>📏 距离：<strong style="color:#6366f1;">${routeData.distanceText}</strong></span>
                            <span>⏱️ 预计：<strong style="color:#6366f1;">${routeData.durationText}</strong></span>
                        </div>
                        <div style="font-size:12px;color:#5a6d7e;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;">
                            <div style="margin-bottom:4px;">🚗 终点：<strong>${order.destination || '目的地'}</strong></div>
                        </div>
                    `;
                } else {
                    routeInfo.innerHTML = '⚠️ 路线规划失败：' + (routeData.error || '未知错误');
                }
            } catch (error) {
                console.error('加载路线失败:', error);
                routeInfo.innerHTML = '⚠️ 加载失败';
            }
        }

        window.onload = function() {
            loadOrders();
        };
    </script>
</body>
</html>
