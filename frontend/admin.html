<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖车救援系统 - 后台管理</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #0066ff;
            --bg-color: #0a0e1a;
            --card-bg: rgba(16, 28, 48, 0.95);
            --text-color: #e0f7ff;
            --accent-color: #ff6b35;
            --success-color: #00ff88;
            --warning-color: #ffcc00;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 50%, #0a0e1a 100%);
            color: var(--text-color);
            min-height: 100vh;
        }
        
        /* 登录页面 */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            text-align: center;
            color: #5a6d7e;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; color: #5a6d7e; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            background: rgba(16, 28, 48, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text-color);
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* 管理后台 */
        .admin-container { display: none; }
        .admin-container.active { display: block; }
        
        .admin-header {
            background: var(--card-bg);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-title { font-size: 20px; font-weight: bold; }
        .admin-user { display: flex; align-items: center; gap: 15px; }
        .logout-btn {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .admin-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
        }
        .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 13px; color: #5a6d7e; }
        .stat-card.primary .stat-value { color: var(--primary-color); }
        .stat-card.success .stat-value { color: var(--success-color); }
        .stat-card.warning .stat-value { color: var(--warning-color); }
        .stat-card.accent .stat-value { color: var(--accent-color); }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding-bottom: 15px;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 25px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: #5a6d7e;
            white-space: nowrap;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: #fff;
            border-color: transparent;
        }
        
        /* 表格 */
        .table-container {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 15px 20px; text-align: left; }
        th {
            background: rgba(0, 240, 255, 0.1);
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
            white-space: nowrap;
        }
        tr { border-bottom: 1px solid rgba(0, 240, 255, 0.1); }
        tr:last-child { border-bottom: none; }
        tr:hover { background: rgba(0, 240, 255, 0.05); }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        .status-pending { background: rgba(255, 107, 53, 0.2); color: var(--accent-color); }
        .status-processing { background: rgba(0, 240, 255, 0.2); color: var(--primary-color); }
        .status-completed { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .status-cancelled { background: rgba(128, 128, 128, 0.2); color: #888; }
        
        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 8px;
            white-space: nowrap;
        }
        .btn-view { background: rgba(0, 240, 255, 0.2); color: var(--primary-color); }
        .btn-complete { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .btn-cancel { background: rgba(255, 107, 53, 0.2); color: var(--accent-color); }
        .btn-assign { background: rgba(0, 102, 255, 0.2); color: var(--secondary-color); }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.95);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }
        .modal.active { display: block; }
        .modal-content {
            background: var(--card-bg);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            margin: 50px auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.2);
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 18px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }
        .detail-label { color: #5a6d7e; font-size: 13px; }
        .detail-value { font-size: 14px; }
        
        .map-box {
            height: 300px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid rgba(0, 240, 255, 0.3);
        }
        
        .timeline {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 240, 255, 0.05);
            border-radius: 10px;
        }
        .timeline-item {
            display: flex;
            gap: 15px;
            padding: 10px 0;
            border-left: 2px solid var(--primary-color);
            padding-left: 20px;
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 15px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary-color);
        }
        .timeline-time { font-size: 12px; color: #5a6d7e; min-width: 60px; }
        .timeline-content { font-size: 14px; }
        
        .form-select {
            width: 100%;
            background: rgba(16, 28, 48, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 30px;
            z-index: 3000;
            min-width: 320px;
            text-align: center;
        }
        .alert.success { border-color: var(--success-color); }
        .alert.error { border-color: var(--accent-color); }
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2999;
        }
        
        .refresh-btn {
            background: rgba(0, 240, 255, 0.2);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="login-title">🚗 拖车救援系统</div>
            <div class="login-subtitle">后台管理</div>
            <div class="form-group">
                <label class="form-label">管理员账号</label>
                <input type="text" class="form-input" id="adminUsername" placeholder="请输入管理员账号" value="admin">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码" value="admin123">
            </div>
            <button class="login-btn" onclick="login()">登录</button>
        </div>
    </div>

    <!-- 管理后台 -->
    <div class="admin-container" id="adminPanel">
        <div class="admin-header">
            <div class="admin-title">🚗 拖车救援系统 - 后台管理</div>
            <div class="admin-user">
                <span id="adminName">管理员</span>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="admin-content">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-value" id="totalOrders">0</div>
                    <div class="stat-label">总订单数</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" id="pendingOrders">0</div>
                    <div class="stat-label">待处理</div>
                </div>
                <div class="stat-card accent">
                    <div class="stat-value" id="processingOrders">0</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" id="completedOrders">0</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('orders', this)">📋 订单管理</div>
                <div class="tab" onclick="switchTab('drivers', this)">🚛 司机管理</div>
                <div class="tab" onclick="switchTab('users', this)">👥 用户管理</div>
            </div>

            <!-- 订单管理 -->
            <div id="ordersTab" class="tab-content">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>用户</th>
                                <th>当前位置</th>
                                <th>目的地</th>
                                <th>车辆信息</th>
                                <th>价格</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- 司机管理 -->
            <div id="driversTab" class="tab-content" style="display:none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>司机姓名</th>
                                <th>联系电话</th>
                                <th>评分</th>
                                <th>完成订单</th>
                                <th>救援车辆</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="driversTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="usersTab" class="tab-content" style="display:none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>手机号</th>
                                <th>余额</th>
                                <th>积分</th>
                                <th>订单数</th>
                                <th>总消费</th>
                                <th>注册时间</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 订单详情弹窗 -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">📋 订单详情</span>
                <button class="modal-close" onclick="closeModal('orderModal')">×</button>
            </div>
            <div id="orderDetail"></div>
            <div class="map-box" id="orderMap"></div>
            
            <div class="timeline" id="orderTimeline">
                <div style="font-size:14px;font-weight:bold;margin-bottom:10px;">📝 订单时间线</div>
                <div id="timelineContent"></div>
            </div>
            
            <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="action-btn btn-complete" onclick="updateOrderStatus('completed')" style="flex:1;padding:12px;">✅ 标记完成</button>
                <button class="action-btn btn-cancel" onclick="updateOrderStatus('cancelled')" style="flex:1;padding:12px;">❌ 取消订单</button>
                <button class="action-btn btn-assign" onclick="showAssignDriver()" style="flex:1;padding:12px;">🚛 分配司机</button>
            </div>
        </div>
    </div>

    <!-- 分配司机弹窗 -->
    <div class="modal" id="assignModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">🚛 分配司机</span>
                <button class="modal-close" onclick="closeModal('assignModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">选择司机</label>
                <select class="form-select" id="driverSelect" onchange="onDriverChange()">
                    <option value="">请选择司机</option>
                </select>
            </div>
            <div id="driverInfo" style="margin:15px 0;padding:15px;background:rgba(0,240,255,0.05);border-radius:10px;display:none;">
                <div class="detail-row"><span class="detail-label">司机姓名</span><span class="detail-value" id="d_name"></span></div>
                <div class="detail-row"><span class="detail-label">联系电话</span><span class="detail-value" id="d_phone"></span></div>
                <div class="detail-row"><span class="detail-label">救援车辆</span><span class="detail-value" id="d_vehicle"></span></div>
            </div>
            <button class="login-btn" onclick="confirmAssignDriver()">确认分配</button>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="alert-overlay" id="alertOverlay" style="display:none;"></div>
    <div class="alert" id="alertBox" style="display:none;">
        <h3 id="alertTitle">提示</h3>
        <p id="alertMessage" style="margin:15px 0;"></p>
        <button class="login-btn" onclick="hideAlert()" style="margin-top:10px;">确定</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentTab = 'orders';
        let allOrders = [];
        let allDrivers = [];
        let currentOrderId = null;
        let orderMap = null;
        let selectedDriver = null;

        // 登录
        async function login() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminName').textContent = data.admin.username;
                    loadDashboard();
                } else {
                    showAlert('error', '登录失败', data.error);
                }
            } catch (error) {
                showAlert('error', '错误', '网络错误，请稍后重试');
            }
        }

        // 退出
        function logout() {
            localStorage.removeItem('adminToken');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPanel').classList.remove('active');
        }

        // 刷新数据
        function refreshData() {
            loadDashboard();
            if (currentTab === 'orders') loadOrders();
            if (currentTab === 'drivers') loadDrivers();
            if (currentTab === 'users') loadUsers();
        }

        // 切换标签页
        function switchTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab + 'Tab').style.display = 'block';
            
            if (tab === 'orders') loadOrders();
            if (tab === 'drivers') loadDrivers();
            if (tab === 'users') loadUsers();
        }

        // 加载仪表盘
        async function loadDashboard() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`);
                const data = await res.json();
                
                document.getElementById('totalOrders').textContent = data.totalOrders || 0;
                document.getElementById('pendingOrders').textContent = data.pendingOrders || 0;
                document.getElementById('processingOrders').textContent = data.processingOrders || 0;
                document.getElementById('completedOrders').textContent = data.completedOrders || 0;
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载订单
        async function loadOrders() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/orders?status=all&limit=100`);
                const data = await res.json();
                allOrders = data.orders || [];
                
                const tbody = document.getElementById('ordersTable');
                if (allOrders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#5a6d7e;padding:40px;">暂无订单</td></tr>';
                    return;
                }

                tbody.innerHTML = allOrders.map(order => `
                    <tr>
                        <td style="font-family:monospace;">${order.order_no}</td>
                        <td>用户${order.user_id || '-'}</td>
                        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${order.current_location || ''}">${order.current_location || '未知'}</td>
                        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${order.destination || ''}">${order.destination || '无'}</td>
                        <td>${order.vehicle_plate || '-'}</td>
                        <td style="color:var(--accent-color);font-weight:bold;">¥${order.price}</td>
                        <td><span class="status-badge status-${order.status}">${order.status_text}</span></td>
                        <td style="font-size:12px;color:#5a6d7e;white-space:nowrap;">${new Date(order.created_at).toLocaleString('zh-CN')}</td>
                        <td>
                            <button class="action-btn btn-view" onclick="viewOrder(${order.id})">查看</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载订单失败:', error);
                showAlert('error', '错误', '加载订单失败');
            }
        }

        // 加载司机
        async function loadDrivers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/drivers`);
                const data = await res.json();
                allDrivers = data.drivers || [];
                
                const tbody = document.getElementById('driversTable');
                if (allDrivers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#5a6d7e;padding:40px;">暂无司机数据</td></tr>';
                    return;
                }

                tbody.innerHTML = allDrivers.map(driver => `
                    <tr>
                        <td>${driver.name}</td>
                        <td>${driver.phone}</td>
                        <td>⭐ ${driver.rating}</td>
                        <td>${driver.orders}</td>
                        <td>${driver.vehicle_model} (${driver.vehicle_plate})</td>
                        <td><span class="status-badge ${driver.status === '空闲' ? 'status-completed' : 'status-processing'}">${driver.status}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载司机失败:', error);
            }
        }

        // 加载用户
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/users`);
                const data = await res.json();
                const users = data.users || [];
                
                const tbody = document.getElementById('usersTable');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#5a6d7e;padding:40px;">暂无用户数据</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.username}</td>
                        <td>${user.phone}</td>
                        <td style="color:var(--success-color);font-weight:bold;">¥${user.balance}</td>
                        <td>${user.points}</td>
                        <td>${user.orders}</td>
                        <td style="color:var(--accent-color);">¥${user.total_spent}</td>
                        <td style="font-size:12px;color:#5a6d7e;white-space:nowrap;">${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }

        // 查看订单详情
        async function viewOrder(orderId) {
            currentOrderId = orderId;
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/orders/${orderId}`);
                const data = await res.json();
                const order = data.order;

                document.getElementById('orderDetail').innerHTML = `
                    <div class="detail-row"><span class="detail-label">订单号</span><span class="detail-value" style="font-family:monospace;">${order.order_no}</span></div>
                    <div class="detail-row"><span class="detail-label">状态</span><span class="detail-value"><span class="status-badge status-${order.status}">${order.status_text}</span></span></div>
                    <div class="detail-row"><span class="detail-label">当前位置</span><span class="detail-value">${order.current_location}</span></div>
                    <div class="detail-row"><span class="detail-label">目的地</span><span class="detail-value">${order.destination || '无'}</span></div>
                    <div class="detail-row"><span class="detail-label">车辆信息</span><span class="detail-value">${order.vehicle_plate}</span></div>
                    <div class="detail-row"><span class="detail-label">问题描述</span><span class="detail-value">${order.problem_description}</span></div>
                    <div class="detail-row"><span class="detail-label">价格</span><span class="detail-value" style="color:var(--accent-color);font-weight:bold;">¥${order.price}</span></div>
                    <div class="detail-row"><span class="detail-label">创建时间</span><span class="detail-value">${new Date(order.created_at).toLocaleString('zh-CN')}</span></div>
                    ${order.driver ? `
                    <div class="detail-row"><span class="detail-label">分配司机</span><span class="detail-value">${order.driver.name} (${order.driver.phone})</span></div>
                    <div class="detail-row"><span class="detail-label">救援车辆</span><span class="detail-value">${order.driver.vehicle_model} (${order.driver.vehicle_plate})</span></div>
                    ` : '<div class="detail-row"><span class="detail-label">分配司机</span><span class="detail-value" style="color:#5a6d7e;">未分配</span></div>'}
                `;

                // 时间线
                const timelineContent = document.getElementById('timelineContent');
                if (order.timeline && order.timeline.length > 0) {
                    timelineContent.innerHTML = order.timeline.map(t => `
                        <div class="timeline-item">
                            <div class="timeline-time">${t.time}</div>
                            <div class="timeline-content">${t.content}</div>
                        </div>
                    `).join('');
                } else {
                    timelineContent.innerHTML = '<div style="color:#5a6d7e;text-align:center;padding:20px;">暂无时间线记录</div>';
                }

                document.getElementById('orderModal').classList.add('active');
                
                // 初始化地图
                setTimeout(() => initOrderMap(order), 100);
            } catch (error) {
                showAlert('error', '错误', '获取订单详情失败');
            }
        }

        // 初始化订单地图
        function initOrderMap(order) {
            if (orderMap) {
                orderMap.remove();
            }

            // 尝试解析坐标或使用默认位置
            let lat = 39.9042, lng = 116.4074;
            const coords = order.current_location?.match(/(-?\d+\.?\d*),\s*(-?\d+\.?\d*)/);
            if (coords) {
                lat = parseFloat(coords[1]);
                lng = parseFloat(coords[2]);
            }

            orderMap = L.map('orderMap').setView([lat, lng], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(orderMap);

            // 标记当前位置
            L.marker([lat, lng]).addTo(orderMap)
                .bindPopup('📍 当前位置')
                .openPopup();

            // 如果有目的地，也标记
            if (order.destination) {
                const destCoords = order.destination.match(/(-?\d+\.?\d*),\s*(-?\d+\.?\d*)/);
                if (destCoords) {
                    const destLat = parseFloat(destCoords[1]);
                    const destLng = parseFloat(destCoords[2]);
                    L.marker([destLat, destLng]).addTo(orderMap)
                        .bindPopup('🎯 目的地');
                }
            }
        }

        // 更新订单状态
        async function updateOrderStatus(status) {
            if (!currentOrderId) return;

            try {
                const res = await fetch(`${API_BASE}/api/admin/orders/${currentOrderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('success', '操作成功', `订单已标记为${status === 'completed' ? '已完成' : '已取消'}`, () => {
                        closeModal('orderModal');
                        loadDashboard();
                        loadOrders();
                    });
                } else {
                    showAlert('error', '错误', data.error);
                }
            } catch (error) {
                showAlert('error', '错误', '更新状态失败');
            }
        }

        // 显示分配司机
        async function showAssignDriver() {
            if (!currentOrderId) return;

            // 加载司机列表
            try {
                const res = await fetch(`${API_BASE}/api/admin/drivers`);
                const data = await res.json();
                allDrivers = data.drivers || [];

                const select = document.getElementById('driverSelect');
                select.innerHTML = '<option value="">请选择司机</option>' + 
                    allDrivers.map(d => `<option value="${d.id}">${d.name} - ${d.vehicle_plate}</option>`).join('');
                
                document.getElementById('driverInfo').style.display = 'none';
                document.getElementById('assignModal').classList.add('active');
            } catch (error) {
                showAlert('error', '错误', '加载司机列表失败');
            }
        }

        // 司机选择变化
        function onDriverChange() {
            const driverId = document.getElementById('driverSelect').value;
            selectedDriver = allDrivers.find(d => d.id == driverId);
            
            if (selectedDriver) {
                document.getElementById('d_name').textContent = selectedDriver.name;
                document.getElementById('d_phone').textContent = selectedDriver.phone;
                document.getElementById('d_vehicle').textContent = `${selectedDriver.vehicle_model} (${selectedDriver.vehicle_plate})`;
                document.getElementById('driverInfo').style.display = 'block';
            } else {
                document.getElementById('driverInfo').style.display = 'none';
            }
        }

        // 确认分配司机
        async function confirmAssignDriver() {
            if (!selectedDriver) {
                showAlert('error', '提示', '请选择司机');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/admin/orders/${currentOrderId}/driver`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        driver_id: selectedDriver.id,
                        driver_name: selectedDriver.name,
                        driver_phone: selectedDriver.phone,
                        driver_rating: selectedDriver.rating,
                        vehicle_plate: selectedDriver.vehicle_plate,
                        vehicle_model: selectedDriver.vehicle_model
                    })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('success', '分配成功', `已分配司机：${selectedDriver.name}`, () => {
                        closeModal('assignModal');
                        closeModal('orderModal');
                        loadDashboard();
                        loadOrders();
                    });
                } else {
                    showAlert('error', '错误', data.error);
                }
            } catch (error) {
                showAlert('error', '错误', '分配司机失败');
            }
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // 提示框
        function showAlert(type, title, message, callback) {
            const alert = document.getElementById('alertBox');
            const overlay = document.getElementById('alertOverlay');
            
            alert.className = 'alert ' + type;
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').innerHTML = message.replace(/\n/g, '<br>');
            
            alert.callback = callback;
            alert.style.display = 'block';
            overlay.style.display = 'block';
        }

        function hideAlert() {
            const alert = document.getElementById('alertBox');
            const overlay = document.getElementById('alertOverlay');
            
            alert.style.display = 'none';
            overlay.style.display = 'none';
            
            if (alert.callback) {
                alert.callback();
                alert.callback = null;
            }
        }

        // 回车登录
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
                login();
            }
        });

        // 页面加载时检查登录状态
        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadDashboard();
            }
        });
    </script>
</body>
</html>
