<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖车司机端 - 智慧救援</title>
    <script type="text/javascript" src="https://map.qq.com/api/js?v=2.exp&key=67MBZ-EF6RT-THAX4-VEGBL-7AYMJ-LGBXX"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #0066ff;
            --bg-color: #0a0e1a;
            --card-bg: rgba(16, 28, 48, 0.95);
            --text-color: #e0f7ff;
            --accent-color: #ff6b35;
            --success-color: #00ff88;
            --warning-color: #ffa500;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 50%, #0a0e1a 100%);
            color: var(--text-color);
            min-height: 100vh;
        }
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.3), rgba(0, 240, 255, 0.1));
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
        }
        .header h1 {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(10, 14, 26, 0.95);
            border-top: 1px solid rgba(0, 240, 255, 0.3);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a6d7e;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-text { font-size: 11px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .task-item {
            background: rgba(16, 28, 48, 0.6);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .task-item:active { background: rgba(0, 240, 255, 0.1); }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .task-no {
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .task-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0, 240, 255, 0.2);
            color: var(--primary-color);
        }
        .task-status.processing { background: rgba(255, 165, 0, 0.2); color: var(--warning-color); }
        .task-status.completed { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .task-info {
            font-size: 12px;
            color: #8a9ba8;
            line-height: 1.6;
        }
        .task-info span {
            color: var(--text-color);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #000;
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
            color: #000;
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #ff8c00);
            color: #000;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }
        .btn:active { transform: scale(0.98); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8a9ba8;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .photo-upload {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .timeline {
            position: relative;
            padding-left: 20px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(0, 240, 255, 0.2);
        }
        .timeline-item {
            position: relative;
            padding-bottom: 15px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary-color);
        }
        .timeline-time {
            font-size: 11px;
            color: #5a6d7e;
        }
        .timeline-content {
            font-size: 13px;
            color: var(--text-color);
            margin-top: 4px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: rgba(0, 240, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .stat-label {
            font-size: 12px;
            color: #8a9ba8;
            margin-top: 5px;
        }
        .location-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .location-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 登录页面 -->
        <div id="loginPage" class="page active">
            <div class="header">
                <h1>🚛 拖车司机端</h1>
            </div>
            <div class="card" style="margin-top: 30px;">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" placeholder="请输入手机号" value="13900139001" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" value="123456" />
                </div>
                <button class="btn btn-primary" onclick="driverLogin()">登录</button>
                <button class="btn btn-warning" onclick="showRegister()" style="margin-top: 10px;">注册账号</button>
                <div style="margin-top:20px;font-size:12px;color:#5a6d7e;">
                    <div>测试账号：</div>
                    <div>13900139001 / 123456 - 王师傅（128 单）</div>
                    <div>13900139002 / 123456 - 李师傅（256 单）</div>
                    <div>13900139003 / 123456 - 张师傅（89 单）</div>
                </div>
            </div>
        </div>

        <!-- 注册页面 -->
        <div id="registerPage" class="page">
            <div class="header">
                <h1>司机注册</h1>
            </div>
            <div class="card" style="margin-top: 30px;">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="请输入姓名" />
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="regPhone" placeholder="请输入手机号" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码" />
                </div>
                <div class="form-group">
                    <label>驾驶证号</label>
                    <input type="text" id="regLicense" placeholder="请输入驾驶证号" />
                </div>
                <div class="form-group">
                    <label>从业资格证号</label>
                    <input type="text" id="regQualification" placeholder="请输入从业资格证号" />
                </div>
                <button class="btn btn-primary" onclick="driverRegister()">提交注册</button>
                <button class="btn btn-warning" onclick="showLogin()" style="margin-top: 10px;">返回登录</button>
            </div>
        </div>

        <!-- 任务列表页面 -->
        <div id="taskListPage" class="page">
            <div class="header">
                <h1>🚛 我的任务</h1>
            </div>
            <div id="locationStatus" class="location-status hidden">
                <span style="font-size: 13px;">📍 位置实时更新中</span>
                <div class="location-dot"></div>
            </div>
            <div class="card">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="todayOrders">0</div>
                        <div class="stat-label">今日订单</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="todayIncome">¥0</div>
                        <div class="stat-label">今日收入</div>
                    </div>
                </div>
            </div>
            <div id="taskList"></div>
        </div>

        <!-- 任务详情页面 -->
        <div id="taskDetailPage" class="page">
            <div class="header">
                <h1>任务详情</h1>
            </div>
            <div id="taskDetail"></div>
            <div class="card">
                <div class="card-title">📋 任务时间线</div>
                <div id="taskTimeline" class="timeline"></div>
            </div>
            <div id="taskActions"></div>
        </div>

        <!-- 个人中心页面 -->
        <div id="profilePage" class="page">
            <div class="header">
                <h1>👤 个人中心</h1>
            </div>
            <div class="card">
                <div id="driverProfile"></div>
            </div>
            <div class="card">
                <div class="card-title">📊 我的统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalOrders">0</div>
                        <div class="stat-label">总订单</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="driverRating">5.0</div>
                        <div class="stat-label">评分</div>
                    </div>
                </div>
            </div>
            <button class="btn btn-danger" onclick="driverLogout()" style="margin-top: 20px;">退出登录</button>
        </div>

        <!-- 底部导航 -->
        <div id="bottomNav" class="bottom-nav hidden">
            <div class="nav-item active" onclick="switchPage('taskListPage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="nav-text">任务</span>
            </div>
            <div class="nav-item" onclick="switchPage('profilePage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="nav-text">我的</span>
            </div>
        </div>

        <!-- 任务详情弹窗 -->
        <div id="taskModal" class="modal">
            <div class="modal-content">
                <div class="modal-title" id="modalTitle">任务详情</div>
                <div id="modalBody"></div>
            </div>
        </div>

        <!-- 拒绝原因弹窗 -->
        <div id="rejectModal" class="modal">
            <div class="modal-content">
                <div class="modal-title">拒绝原因</div>
                <div class="form-group">
                    <textarea id="rejectReason" placeholder="请输入拒绝原因"></textarea>
                </div>
                <button class="btn btn-danger" onclick="submitReject()">确认拒绝</button>
                <button class="btn btn-warning" onclick="closeRejectModal()" style="margin-top: 10px;">取消</button>
            </div>
        </div>

        <!-- 费用上报弹窗 -->
        <div id="expenseModal" class="modal">
            <div class="modal-content">
                <div class="modal-title">费用上报</div>
                <div class="form-group">
                    <label>费用类型</label>
                    <select id="expenseType">
                        <option value="oil">油费</option>
                        <option value="maintenance">维修保养</option>
                        <option value="extra">其他费用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="expenseAmount" placeholder="请输入金额" />
                </div>
                <div class="form-group">
                    <label>说明</label>
                    <textarea id="expenseDesc" placeholder="请输入费用说明"></textarea>
                </div>
                <button class="btn btn-primary" onclick="submitExpense()">提交</button>
                <button class="btn btn-warning" onclick="document.getElementById('expenseModal').classList.remove('active')" style="margin-top: 10px;">取消</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentDriver = null;
        let currentTask = null;
        let locationTimer = null;

        // 页面切换
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (pageId === 'taskListPage') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                loadTasks();
            } else if (pageId === 'profilePage') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                loadProfile();
            }
        }

        // 司机登录
        async function driverLogin() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!phone || !password) {
                alert('请输入手机号和密码');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/drivers/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                
                if (data.token) {
                    currentDriver = data.driver;
                    localStorage.setItem('driverToken', data.token);
                    localStorage.setItem('driverInfo', JSON.stringify(data.driver));
                    document.getElementById('loginPage').classList.remove('active');
                    document.getElementById('bottomNav').classList.remove('hidden');
                    switchPage('taskListPage');
                    startLocationUpdate();
                } else {
                    alert(data.error || '登录失败');
                }
            } catch (error) {
                alert('登录失败，请重试');
            }
        }

        // 司机注册
        async function driverRegister() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const license_no = document.getElementById('regLicense').value;
            const qualification_no = document.getElementById('regQualification').value;
            
            if (!name || !phone || !password) {
                alert('请填写必填信息');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/drivers/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, password, license_no, qualification_no })
                });
                const data = await res.json();
                
                alert(data.message || '注册成功');
                if (data.success) showLogin();
            } catch (error) {
                alert('注册失败，请重试');
            }
        }

        // 加载任务列表
        async function loadTasks() {
            if (!currentDriver) return;
            
            try {
                // 先初始化模拟数据
                await fetch(`${API_BASE}/drivers/init-mock`, { method: 'POST' }).catch(() => {});
                
                const res = await fetch(`${API_BASE}/drivers/tasks?driver_id=${currentDriver.id}`);
                const data = await res.json();
                
                const taskList = document.getElementById('taskList');
                if (data.tasks.length === 0) {
                    taskList.innerHTML = '<div class="card" style="text-align:center;color:#5a6d7e;">暂无任务</div>';
                    return;
                }

                let todayOrders = 0;
                let todayIncome = 0;
                const today = new Date().toDateString();

                taskList.innerHTML = data.tasks.map(task => {
                    const createdDate = new Date(task.created_at).toDateString();
                    if (createdDate === today) {
                        todayOrders++;
                        if (task.status === 'completed') todayIncome += task.price || 0;
                    }
                    
                    return `
                        <div class="task-item" onclick="loadTaskDetail(${task.id})">
                            <div class="task-header">
                                <span class="task-no">${task.order_no}</span>
                                <span class="task-status ${task.status}">${task.status_text}</span>
                            </div>
                            <div class="task-info">
                                车牌：<span>${task.vehicle_plate || '未填写'}</span><br/>
                                位置：<span>${task.current_location}</span><br/>
                                目的地：<span>${task.destination || '未填写'}</span><br/>
                                费用：<span style="color:var(--accent-color)">¥${task.price || 0}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('todayOrders').textContent = todayOrders;
                document.getElementById('todayIncome').textContent = '¥' + todayIncome;
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }

        // 加载任务详情
        async function loadTaskDetail(taskId) {
            try {
                const res = await fetch(`${API_BASE}/drivers/tasks/${taskId}`);
                const data = await res.json();
                
                currentTask = data.task;
                const task = data.task;
                
                document.getElementById('taskDetail').innerHTML = `
                    <div class="card">
                        <div class="card-title">📋 订单信息</div>
                        <div style="font-size:13px;line-height:1.8;">
                            <div>订单号：<span style="color:var(--primary-color)">${task.order_no}</span></div>
                            <div>服务类型：<span>${task.service_type === 'accident' ? '事故拖车' : task.service_type === 'violation' ? '违法拖车' : '故障救援'}</span></div>
                            <div>车牌号：<span>${task.vehicle_plate || '未填写'}</span></div>
                            <div>车型：<span>${task.vehicle_type === 'sedan' ? '轿车' : task.vehicle_type === 'suv' ? 'SUV' : '其他'}</span></div>
                            <div>颜色：<span>${task.vehicle_color || '未填写'}</span></div>
                            <div>当前地址：<span>${task.current_location}</span></div>
                            <div>目的地：<span>${task.destination || '未填写'}</span></div>
                            <div>车主：<span>${task.owner_name || '未填写'} (${task.owner_phone})</span></div>
                            <div>可移动：<span>${task.movable === 'yes' ? '✅ 是' : '❌ 否'}</span></div>
                            <div>优先级：<span style="color:${task.priority === 'urgent' ? 'var(--accent-color)' : 'var(--text-color)'}">${task.priority === 'urgent' ? '🔴 紧急' : task.priority === 'high' ? '🟡 高' : '⚪ 普通'}</span></div>
                            ${task.special_note ? `<div>备注：<span>${task.special_note}</span></div>` : ''}
                            ${task.insurance_no ? `<div>保险单号：<span>${task.insurance_no}</span></div>` : ''}
                        </div>
                    </div>
                    ${task.photos && task.photos.length > 0 ? `
                        <div class="card">
                            <div class="card-title">📸 现场照片</div>
                            <div class="photo-upload">
                                ${task.photos.map(p => `<img class="photo-item" src="${p}" onclick="viewPhoto('${p}')"/>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;

                document.getElementById('taskTimeline').innerHTML = task.timeline.map(t => `
                    <div class="timeline-item">
                        <div class="timeline-time">${t.time}</div>
                        <div class="timeline-content">${t.content}</div>
                    </div>
                `).join('');

                // 操作按钮
                let actions = '';
                if (task.status === 'processing' && task.progress === 0) {
                    actions = `
                        <div class="card">
                            <button class="btn btn-success" onclick="confirmTask(${task.id}, true)">✅ 确认任务</button>
                            <button class="btn btn-danger" onclick="showRejectModal(${task.id})">❌ 拒绝任务</button>
                        </div>
                    `;
                } else if (task.status === 'processing' && task.progress === 10) {
                    actions = `
                        <div class="card">
                            <button class="btn btn-primary" onclick="arriveSite(${task.id})">📍 到达现场</button>
                        </div>
                    `;
                } else if (task.status === 'processing' && task.progress === 50) {
                    actions = `
                        <div class="card">
                            <button class="btn btn-primary" onclick="arriveDest(${task.id})">🎯 到达目的地</button>
                        </div>
                    `;
                } else if (task.status === 'processing' && task.progress === 80) {
                    actions = `
                        <div class="card">
                            <button class="btn btn-success" onclick="showCompleteModal(${task.id})">✅ 完成任务</button>
                        </div>
                    `;
                }

                document.getElementById('taskActions').innerHTML = actions;
                switchPage('taskDetailPage');
            } catch (error) {
                alert('加载任务详情失败');
            }
        }

        // 确认/拒绝任务
        async function confirmTask(taskId, accepted) {
            try {
                const res = await fetch(`${API_BASE}/drivers/tasks/${taskId}/confirm`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accepted })
                });
                const data = await res.json();
                
                alert(data.message);
                if (data.success) loadTaskDetail(taskId);
            } catch (error) {
                alert('操作失败');
            }
        }

        // 显示拒绝弹窗
        function showRejectModal(taskId) {
            currentTaskId = taskId;
            document.getElementById('rejectModal').classList.add('active');
        }

        function closeRejectModal() {
            document.getElementById('rejectModal').classList.remove('active');
            document.getElementById('rejectReason').value = '';
        }

        async function submitReject() {
            const reason = document.getElementById('rejectReason').value;
            await confirmTask(currentTaskId, false);
            closeRejectModal();
            loadTasks();
        }

        // 到达现场
        async function arriveSite(taskId) {
            try {
                const res = await fetch(`${API_BASE}/drivers/tasks/${taskId}/arrive-site`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                alert(data.message);
                loadTaskDetail(taskId);
            } catch (error) {
                alert('操作失败');
            }
        }

        // 到达目的地
        async function arriveDest(taskId) {
            const signUser = prompt('请输入签收人姓名：');
            if (!signUser) return;
            
            try {
                const res = await fetch(`${API_BASE}/drivers/tasks/${taskId}/arrive-dest`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sign_user: signUser })
                });
                const data = await res.json();
                alert(data.message);
                loadTaskDetail(taskId);
            } catch (error) {
                alert('操作失败');
            }
        }

        // 显示完成弹窗
        function showCompleteModal(taskId) {
            const towFee = parseFloat(prompt('请输入拖车费：') || '0');
            const mileageFee = parseFloat(prompt('请输入里程费：') || '0');
            const extraFee = parseFloat(prompt('请输入其他费用：') || '0');
            const totalFee = towFee + mileageFee + extraFee;
            
            if (confirm(`总费用：¥${totalFee}，确认完成任务？`)) {
                completeTask(taskId, towFee, mileageFee, extraFee, totalFee);
            }
        }

        async function completeTask(taskId, towFee, mileageFee, extraFee, totalFee) {
            try {
                const res = await fetch(`${API_BASE}/drivers/tasks/${taskId}/complete`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ towFee, mileageFee, extraFee, totalFee })
                });
                const data = await res.json();
                alert(data.message);
                loadTasks();
            } catch (error) {
                alert('操作失败');
            }
        }

        // 加载个人中心
        async function loadProfile() {
            if (!currentDriver) return;
            
            try {
                const res = await fetch(`${API_BASE}/drivers/profile/${currentDriver.id}`);
                const data = await res.json();
                
                const driver = data.driver;
                document.getElementById('driverProfile').innerHTML = `
                    <div style="font-size:14px;line-height:2;">
                        <div>姓名：<strong>${driver.name}</strong></div>
                        <div>手机号：<strong>${driver.phone}</strong></div>
                        <div>驾驶证号：${driver.license_no || '未填写'}</div>
                        <div>从业资格证：${driver.qualification_no || '未填写'}</div>
                        ${driver.license_expiring ? '<div style="color:var(--warning-color)">⚠️ 驾驶证即将到期</div>' : ''}
                        ${driver.qualification_expiring ? '<div style="color:var(--warning-color)">⚠️ 从业资格证即将到期</div>' : ''}
                        ${driver.vehicle ? `
                            <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,240,255,0.2)">
                                <div>车辆：<strong>${driver.vehicle.plate_no}</strong></div>
                                <div>型号：${driver.vehicle.model || '未填写'}</div>
                                <div>类型：${driver.vehicle.type === 'tow' ? '拖车' : '平板车'}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
                
                document.getElementById('totalOrders').textContent = driver.total_orders || 0;
                document.getElementById('driverRating').textContent = driver.rating || 5.0;
            } catch (error) {
                console.error('加载个人信息失败:', error);
            }
        }

        // 位置更新
        function startLocationUpdate() {
            document.getElementById('locationStatus').classList.remove('hidden');
            
            // 每 10 秒更新一次位置
            locationTimer = setInterval(async () => {
                if (navigator.geolocation && currentDriver) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const { latitude, longitude, speed } = position.coords;
                        
                        try {
                            await fetch(`${API_BASE}/drivers/profile/${currentDriver.id}/location`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ latitude, longitude, speed: speed || 0 })
                            });
                        } catch (error) {
                            console.error('位置更新失败:', error);
                        }
                    });
                }
            }, 10000);
        }

        // 退出登录
        function driverLogout() {
            localStorage.removeItem('driverToken');
            localStorage.removeItem('driverInfo');
            if (locationTimer) clearInterval(locationTimer);
            location.reload();
        }

        // 页面切换辅助
        function showRegister() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('registerPage').classList.add('active');
        }

        function showLogin() {
            document.getElementById('registerPage').classList.remove('active');
            document.getElementById('loginPage').classList.add('active');
        }

        // 检查登录状态
        window.onload = function() {
            const token = localStorage.getItem('driverToken');
            const info = localStorage.getItem('driverInfo');
            
            if (token && info) {
                currentDriver = JSON.parse(info);
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('bottomNav').classList.remove('hidden');
                switchPage('taskListPage');
                startLocationUpdate();
            }
        };
    </script>
</body>
</html>
