<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交管端 - 智慧救援</title>
    <script type="text/javascript" src="https://map.qq.com/api/js?v=2.exp&key=67MBZ-EF6RT-THAX4-VEGBL-7AYMJ-LGBXX"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #0066ff;
            --bg-color: #0a0e1a;
            --card-bg: rgba(16, 28, 48, 0.95);
            --text-color: #e0f7ff;
            --accent-color: #ff6b35;
            --success-color: #00ff88;
            --warning-color: #ffa500;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 50%, #0a0e1a 100%);
            color: var(--text-color);
            min-height: 100vh;
        }
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.3), rgba(0, 240, 255, 0.1));
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
        }
        .header h1 {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-subtitle {
            font-size: 12px;
            color: #5a6d7e;
            margin-top: 5px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(10, 14, 26, 0.95);
            border-top: 1px solid rgba(0, 240, 255, 0.3);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a6d7e;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-text { font-size: 11px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #000;
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
            color: #000;
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #ff8c00);
            color: #000;
        }
        .btn:active { transform: scale(0.98); }
        .btn-float {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #ff8c00);
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.5);
            z-index: 999;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8a9ba8;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .order-item {
            background: rgba(16, 28, 48, 0.6);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .order-item:active { background: rgba(0, 240, 255, 0.1); }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .order-no {
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .order-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0, 240, 255, 0.2);
            color: var(--primary-color);
        }
        .order-status.processing { background: rgba(255, 165, 0, 0.2); color: var(--warning-color); }
        .order-status.completed { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .order-info {
            font-size: 12px;
            color: #8a9ba8;
            line-height: 1.6;
        }
        .order-info span {
            color: var(--text-color);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-align: center;
        }
        
        .timeline {
            position: relative;
            padding-left: 20px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(0, 240, 255, 0.2);
        }
        .timeline-item {
            position: relative;
            padding-bottom: 15px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 4px;
            width: 10px;
            height: 10px;
        }
        
        /* 自定义提示框 */
        .custom-alert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .custom-alert.active { display: flex; }
        .custom-alert-content {
            background: linear-gradient(135deg, rgba(16, 28, 48, 0.98), rgba(10, 14, 26, 0.98));
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15);
            animation: alertSlideIn 0.3s ease-out;
        }
        @keyframes alertSlideIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .custom-alert-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .custom-alert-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .custom-alert-message {
            font-size: 14px;
            color: #8a9ba8;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .custom-alert-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .custom-alert-btn:active { transform: scale(0.95); }
        
        /* 照片预览样式 */
        .photo-upload {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .photo-item {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            cursor: pointer;
        }
            border-radius: 50%;
            background: var(--primary-color);
        }
        .timeline-time {
            font-size: 11px;
            color: #5a6d7e;
        }
        .timeline-content {
            font-size: 13px;
            color: var(--text-color);
            margin-top: 4px;
        }
        
        .photo-upload {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .upload-btn {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: 2px dashed rgba(0, 240, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #5a6d7e;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 登录页面 -->
        <div id="loginPage" class="page active">
            <div class="header">
                <h1>🚓 交管端</h1>
                <div class="header-subtitle">交通管理部门 · 违法拖车申请</div>
            </div>
            <div class="card" style="margin-top: 50px;">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="loginUsername" placeholder="请输入账号" value="traffic001" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" value="123456" />
                </div>
                <button class="btn btn-primary" onclick="trafficLogin()">登录</button>
                <div style="margin-top:20px;font-size:12px;color:#5a6d7e;">
                    <div>测试账号：</div>
                    <div>traffic001 / 123456 - 交管局 - 张警官</div>
                    <div>traffic002 / 123456 - 交管局 - 李警官</div>
                </div>
            </div>
        </div>
        
        <!-- 订单列表页面 -->
        <div id="orderListPage" class="page" style="display:none;">
            <div class="header">
                <h1>🚓 交管端</h1>
                <div class="header-subtitle" id="userInfo">交通管理部门 · 违法拖车申请</div>
            </div>
            <div class="card">
                <div class="card-title">📋 订单列表</div>
                <div id="orderList"></div>
            </div>
        </div>

        <!-- 订单详情页面 -->
        <div id="orderDetailPage" class="page">
            <div class="header">
                <h1>订单详情</h1>
            </div>
            <div id="orderDetail"></div>
            <div class="card">
                <div class="card-title">📋 处理时间线</div>
                <div id="orderTimeline" class="timeline"></div>
            </div>
        </div>

        <!-- 申请页面 -->
        <div id="requestPage" class="page">
            <div class="header">
                <h1>📝 拖车申请</h1>
            </div>
            <div class="card">
                <div class="form-group">
                    <label>车牌号 *</label>
                    <input type="text" id="vehiclePlate" placeholder="请输入车牌号" />
                </div>
                <div class="form-group">
                    <label>车主姓名 *</label>
                    <input type="text" id="ownerName" placeholder="请输入车主姓名" />
                </div>
                <div class="form-group">
                    <label>车主电话 *</label>
                    <input type="tel" id="ownerPhone" placeholder="请输入车主电话" />
                </div>
                <div class="form-group">
                    <label>违法类型 *</label>
                    <select id="violationType">
                        <option value="违停">违停</option>
                        <option value="占用应急车道">占用应急车道</option>
                        <option value="事故车辆">事故车辆</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>发现时间</label>
                    <input type="datetime-local" id="foundTime" />
                </div>
                <div class="form-group">
                    <label>发现地点（地址） *</label>
                    <input type="text" id="foundLocation" placeholder="请输入详细地址或点击地图选点" readonly>
                    <input type="hidden" id="foundAddress">
                    <button class="btn btn-primary" onclick="selectLocation()" style="margin-top:8px;width:100%;">📍 地图选点</button>
                </div>
                <div class="form-group">
                    <label>需求描述</label>
                    <textarea id="description" placeholder="请描述具体情况"></textarea>
                </div>
                <div class="form-group">
                    <label>特殊说明</label>
                    <textarea id="specialNote" placeholder="其他需要说明的事项"></textarea>
                </div>
                <div class="form-group">
                    <label>现场照片/视频</label>
                    <input type="file" id="photoFiles" accept="image/*,video/*" multiple />
                    <div class="photo-upload" id="photoPreview"></div>
                </div>
                <button class="btn btn-primary" onclick="submitRequest()">提交申请</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('orderListPage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="nav-text">订单</span>
            </div>
            <div class="nav-item" onclick="switchPage('requestPage')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span class="nav-text">申请</span>
            </div>
            <div class="nav-item" onclick="trafficLogout()">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H8c-1.11 0-2 .89-2 2v3h2V5h11v14H8v-3H6v3c0 1.11.89 2 2 2h11c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2z"/></svg>
                <span class="nav-text">退出</span>
            </div>
        </div>

        <!-- 订单详情弹窗 -->
        <div id="orderModal" class="modal">
            <div class="modal-content">
                <div class="modal-title">订单详情</div>
                <div id="modalBody"></div>
            </div>
        </div>
        
        <!-- 自定义提示框 -->
        <div id="customAlert" class="custom-alert">
            <div class="custom-alert-content">
                <div id="alertIcon" class="custom-alert-icon">✅</div>
                <div id="alertTitle" class="custom-alert-title">提示</div>
                <div id="alertMessage" class="custom-alert-message"></div>
                <button class="custom-alert-btn" onclick="hideCustomAlert()">确定</button>
            </div>
        </div>
        
        <!-- 照片查看弹窗 -->
        <div id="photoModal" class="modal" onclick="this.classList.remove('active')">
            <img id="photoView" src="" style="max-width:90%;max-height:80vh;border-radius:8px;" onclick="event.stopPropagation()">
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentOrder = null;
        let currentUser = null;
        let uploadedPhotos = [];
        let map = null;

        // 自定义提示框
        function showCustomAlert(type, title, message, callback) {
            const alertBox = document.getElementById('customAlert');
            const icon = document.getElementById('alertIcon');
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').innerHTML = message.replace(/\n/g, '<br>');
            
            if (type === 'success') icon.textContent = '✅';
            else if (type === 'error') icon.textContent = '❌';
            else if (type === 'warning') icon.textContent = '⚠️';
            else icon.textContent = 'ℹ️';
            
            alertBox.callback = callback;
            alertBox.classList.add('active');
        }
        
        function hideCustomAlert() {
            const alertBox = document.getElementById('customAlert');
            alertBox.classList.remove('active');
            if (alertBox.callback) {
                alertBox.callback();
                alertBox.callback = null;
            }
        }
        
        // 查看照片
        function viewPhoto(src) {
            document.getElementById('photoView').src = src;
            document.getElementById('photoModal').classList.add('active');
        }

        // 交管端登录
        async function trafficLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showCustomAlert('warning', '提示', '请输入账号和密码');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/traffic/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.token) {
                    currentUser = data.user;
                    localStorage.setItem('trafficToken', data.token);
                    localStorage.setItem('trafficUser', JSON.stringify(data.user));
                    showOrderList();
                } else {
                    showCustomAlert('error', '登录失败', data.error || '账号或密码错误');
                }
            } catch (error) {
                showCustomAlert('error', '错误', '登录失败，请重试');
            }
        }

        // 显示订单列表页面
        function showOrderList() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('orderListPage').style.display = 'block';
            document.getElementById('userInfo').textContent = `${currentUser.name} | ${currentUser.department}`;
            initMockData();
            loadOrders();
        }

        // 初始化模拟数据
        async function initMockData() {
            try {
                await fetch(`${API_BASE}/traffic/init-mock`, { method: 'POST' });
            } catch (error) {
                console.error('初始化模拟数据失败:', error);
            }
        }

        // 退出登录
        function trafficLogout() {
            localStorage.removeItem('trafficToken');
            localStorage.removeItem('trafficUser');
            location.reload();
        }

        // 检查登录状态
        window.onload = function() {
            const token = localStorage.getItem('trafficToken');
            const user = localStorage.getItem('trafficUser');
            
            if (token && user) {
                currentUser = JSON.parse(user);
                showOrderList();
            }
        };

        // 页面切换
        function switchPage(pageId) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('orderListPage').style.display = 'none';
            document.getElementById('orderDetailPage').style.display = 'none';
            document.getElementById('requestPage').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (pageId === 'orderListPage') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                loadOrders();
            } else if (pageId === 'requestPage') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
            }
        }

        // 加载订单列表
        async function loadOrders() {
            try {
                const res = await fetch(`${API_BASE}/traffic/orders`);
                const data = await res.json();
                
                const orderList = document.getElementById('orderList');
                if (data.orders.length === 0) {
                    orderList.innerHTML = '<div style="text-align:center;color:#5a6d7e;padding:20px;">暂无订单</div>';
                    return;
                }

                orderList.innerHTML = data.orders.map(order => `
                    <div class="order-item" onclick="loadOrderDetail(${order.id})">
                        <div class="order-header">
                            <span class="order-no">${order.order_no}</span>
                            <span class="order-status ${order.status}">${order.status_text}</span>
                        </div>
                        <div class="order-info">
                            车牌：<span>${order.vehicle_plate}</span><br/>
                            违法类型：<span>${order.violation_type}</span><br/>
                            地点：<span>${order.found_location}</span><br/>
                            司机：<span>${order.driver_name || '待分配'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载订单失败:', error);
            }
        }

        // 加载订单详情
        async function loadOrderDetail(orderId) {
            try {
                const res = await fetch(`${API_BASE}/traffic/orders/${orderId}`);
                const data = await res.json();
                
                currentOrder = data.order;
                const order = data.order;
                
                document.getElementById('orderDetail').innerHTML = `
                    <div class="card">
                        <div class="card-title">📋 订单信息</div>
                        <div style="font-size:13px;line-height:1.8;">
                            <div>订单号：<span style="color:var(--primary-color)">${order.order_no}</span></div>
                            <div>状态：<span>${order.status === 'pending' ? '待审核' : order.status === 'processing' ? '处理中' : order.status === 'completed' ? '已完成' : '已取消'}</span></div>
                            <div>车牌号：<span>${order.vehicle_plate}</span></div>
                            <div>车主：<span>${order.owner_name || '未填写'} (${order.owner_phone})</span></div>
                            <div>违法类型：<span>${order.violation_type}</span></div>
                            <div>发现时间：<span>${new Date(order.found_time).toLocaleString('zh-CN')}</span></div>
                            <div>发现地点：<span>${order.found_location}</span></div>
                            ${order.description ? `<div>描述：<span>${order.description}</span></div>` : ''}
                            ${order.special_note ? `<div>备注：<span>${order.special_note}</span></div>` : ''}
                            ${order.driver ? `
                                <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,240,255,0.2)">
                                    <div>司机：<strong>${order.driver.name}</strong></div>
                                    <div>电话：<strong>${order.driver.phone}</strong></div>
                                    <div>车牌：<strong>${order.driver.vehicle_plate || '未填写'}</strong></div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="card" id="routeCard" style="display:none;">
                        <div class="card-title">🚔 拖车路线</div>
                        <div id="routeMap" style="width:100%;height:300px;border-radius:8px;margin-bottom:10px;"></div>
                        <div id="routeInfo" style="font-size:13px;color:#8a9ba8;line-height:1.8;">
                            🔄 正在加载地图...
                        </div>
                    </div>
                    
                    ${order.photos && order.photos.length > 0 ? `
                        <div class="card">
                            <div class="card-title">📸 现场照片</div>
                            <div class="photo-upload">
                                ${order.photos.map(p => `<img class="photo-item" src="${p}" onclick="viewPhoto('${p}')"/>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;

                document.getElementById('orderTimeline').innerHTML = order.timeline.map(t => `
                    <div class="timeline-item">
                        <div class="timeline-time">${t.time}</div>
                        <div class="timeline-content">${t.content}</div>
                    </div>
                `).join('');

                // 加载路线信息
                loadRouteInfo(order);

                switchPage('orderDetailPage');
            } catch (error) {
                showCustomAlert('error', '错误', '加载订单详情失败');
            }
        }
        
        // 加载路线信息
        let routeMap = null;
        let routeMarkerFrom = null;
        let routeMarkerTo = null;
        let routePolyline = null;
        
        async function loadRouteInfo(order) {
            const routeCard = document.getElementById('routeCard');
            const routeInfo = document.getElementById('routeInfo');
            const routeMapContainer = document.getElementById('routeMap');
            
            routeCard.style.display = 'block';
            
            try {
                // 获取交警队地址
                const stationRes = await fetch(`${API_BASE}/traffic/police-station`);
                const stationData = await stationRes.json();
                const station = stationData.station;
                
                // 解析发现地点坐标（从 found_address 字段）
                const coordStr = order.found_address || '';
                let fromCoord = null;
                
                if (coordStr && coordStr.includes(',')) {
                    const parts = coordStr.split(',');
                    fromCoord = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
                }
                
                if (!fromCoord) {
                    routeInfo.innerHTML = '⚠️ 无法获取位置坐标';
                    return;
                }
                
                // 初始化地图
                routeMap = new qq.maps.Map(routeMapContainer, {
                    center: new qq.maps.LatLng(fromCoord.lat, fromCoord.lng),
                    zoom: 12
                });
                
                // 起点标记
                routeMarkerFrom = new qq.maps.Marker({
                    position: new qq.maps.LatLng(fromCoord.lat, fromCoord.lng),
                    map: routeMap,
                    title: '发现地点'
                });
                
                // 终点标记
                routeMarkerTo = new qq.maps.Marker({
                    position: new qq.maps.LatLng(station.lat, station.lng),
                    map: routeMap,
                    title: station.name
                });
                
                // 调用腾讯地图路线规划 API 获取路线坐标
                const key = '67MBZ-EF6RT-THAX4-VEGBL-7AYMJ-LGBXX';
                const routeUrl = `https://apis.map.qq.com/ws/direction/v1/driving/?from=${fromCoord.lat},${fromCoord.lng}&to=${station.lat},${station.lng}&key=${key}`;
                
                try {
                    const response = await fetch(routeUrl);
                    const data = await response.json();
                    
                    if (data.status === 0 && data.result && data.result.routes && data.result.routes.length > 0) {
                        const route = data.result.routes[0];
                        const distance = (route.distance / 1000).toFixed(1);
                        const duration = Math.round(route.duration / 60);
                        
                        // 解析路线坐标点
                        const polyPoints = [];
                        const steps = route.steps || [];
                        
                        steps.forEach(step => {
                            if (step.polyline) {
                                const points = step.polyline.split(';');
                                points.forEach(point => {
                                    const coords = point.split(',');
                                    if (coords.length === 2) {
                                        polyPoints.push(new qq.maps.LatLng(parseFloat(coords[0]), parseFloat(coords[1])));
                                    }
                                });
                            }
                        });
                        
                        // 绘制路线
                        if (polyPoints.length > 0) {
                            routePolyline = new qq.maps.Polyline({
                                map: routeMap,
                                path: polyPoints,
                                strokeColor: '#00f0ff',
                                strokeWeight: 5,
                                strokeOpacity: 0.8,
                                strokeStyle: qq.maps.StrokeStyle.SOLID
                            });
                            
                            // 调整地图视野以显示完整路线
                            const bounds = new qq.maps.LatLngBounds();
                            bounds.extend(new qq.maps.LatLng(fromCoord.lat, fromCoord.lng));
                            bounds.extend(new qq.maps.LatLng(station.lat, station.lng));
                            polyPoints.forEach(p => bounds.extend(p));
                            routeMap.fitBounds(bounds);
                        }
                        
                        routeInfo.innerHTML = `
                            <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(0,240,255,0.1);border-radius:8px;margin-bottom:8px;">
                                <span>📏 距离：<strong style="color:var(--primary-color);">${distance}公里</strong></span>
                                <span>⏱️ 预计：<strong style="color:var(--primary-color);">${duration}分钟</strong></span>
                            </div>
                            <div style="font-size:12px;color:#5a6d7e;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;">
                                <div style="margin-bottom:4px;">🚔 <strong>终点：</strong>${station.name}</div>
                                <div style="color:#8a9ba8;">📍 ${station.address}</div>
                            </div>
                        `;
                    } else {
                        routeInfo.innerHTML = '⚠️ 路线规划失败：' + (data.message || '未知错误');
                    }
                } catch (mapError) {
                    console.error('地图 API 错误:', mapError);
                    routeInfo.innerHTML = '⚠️ 地图加载失败';
                }
            } catch (error) {
                console.error('加载路线失败:', error);
                routeInfo.innerHTML = '⚠️ 加载失败';
            }
        }

        // 提交申请
        async function submitRequest() {
            const vehicle_plate = document.getElementById('vehiclePlate').value;
            const owner_name = document.getElementById('ownerName').value;
            const owner_phone = document.getElementById('ownerPhone').value;
            const violation_type = document.getElementById('violationType').value;
            const found_time = document.getElementById('foundTime').value;
            const found_location = document.getElementById('foundLocation').value;
            const found_address = document.getElementById('foundAddress').value;
            const description = document.getElementById('description').value;
            const special_note = document.getElementById('specialNote').value;

            if (!vehicle_plate || !owner_name || !owner_phone || !found_location) {
                showCustomAlert('warning', '提示', '请填写必填信息');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/traffic/tow-request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vehicle_plate,
                        owner_name,
                        owner_phone,
                        violation_type,
                        found_time,
                        found_location,
                        found_address,
                        description,
                        special_note,
                        photos: uploadedPhotos
                    })
                });
                const data = await res.json();
                
                showCustomAlert('success', '提交成功', data.message || '申请已提交', () => {
                    if (data.orderId) {
                        // 清空表单
                        document.getElementById('vehiclePlate').value = '';
                        document.getElementById('ownerName').value = '';
                        document.getElementById('ownerPhone').value = '';
                        document.getElementById('foundLocation').value = '';
                        document.getElementById('foundAddress').value = '';
                        document.getElementById('description').value = '';
                        document.getElementById('specialNote').value = '';
                        uploadedPhotos = [];
                        document.getElementById('photoPreview').innerHTML = '';
                        
                        switchPage('orderListPage');
                    }
                });
            } catch (error) {
                showCustomAlert('error', '错误', '提交失败，请重试');
            }
        }

        // 地图选点
        let selectedLatLng = null;
        let marker = null;
        let selectedAddress = '';

        function selectLocation() {
            const modal = document.createElement('div');
            modal.id = 'locationModal';
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:90%;width:400px;position:relative;z-index:10001;">
                    <div class="modal-title">📍 地图选点</div>
                    <div style="font-size:12px;color:#8a9ba8;margin-bottom:10px;">点击地图选择位置</div>
                    <div id="mapContainer" style="width:100%;height:450px;border-radius:8px;position:relative;z-index:1;"></div>
                    <div id="selectedInfo" style="font-size:14px;color:var(--primary-color);margin:10px 0;font-weight:bold;min-height:40px;">🔄 正在定位...</div>
                    <button class="btn btn-primary" onclick="confirmLocation()" style="margin-top:10px;">确认选择</button>
                    <button class="btn btn-warning" onclick="closeLocationModal()" style="margin-top:10px;">取消</button>
                </div>
            `;
            document.body.appendChild(modal);

            setTimeout(() => {
                map = new qq.maps.Map(document.getElementById('mapContainer'), {
                    zoom: 15,
                    center: new qq.maps.LatLng(39.9042, 116.4074)
                });

                // 获取地址函数（调用后端 Web Service API）
                async function fetchAddress(lat, lng) {
                    document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                    try {
                        const res = await fetch('/api/traffic/geocode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lat, lng })
                        });
                        const data = await res.json();
                        if (data.success && data.address) {
                            selectedAddress = data.address;
                            document.getElementById('selectedInfo').textContent = `📍 ${selectedAddress}`;
                            console.log('✅ 地址:', selectedAddress);
                        } else {
                            document.getElementById('selectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                        }
                    } catch (error) {
                        console.log('获取地址失败:', error);
                        document.getElementById('selectedInfo').textContent = `📍 坐标：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    }
                }

                // 获取当前位置（HTTPS 下可用）
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            const center = new qq.maps.LatLng(lat, lng);
                            map.setCenter(center);
                            map.setZoom(16);
                            
                            marker = new qq.maps.Marker({
                                position: center,
                                map: map
                            });
                            
                            selectedLatLng = { lat, lng };
                            document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                            
                            // 调用 Web Service API 获取地址
                            fetchAddress(lat, lng);
                        },
                        (error) => {
                            console.log('GPS 定位失败:', error.message);
                            document.getElementById('selectedInfo').textContent = '💡 请在地图上点击选择位置';
                        }
                    );
                } else {
                    document.getElementById('selectedInfo').textContent = '💡 请在地图上点击选择位置';
                }

                // 点击地图选点
                qq.maps.event.addListener(map, 'click', function(event) {
                    const latLng = event.latLng;
                    
                    if (marker) marker.setMap(null);
                    
                    marker = new qq.maps.Marker({
                        position: latLng,
                        map: map
                    });
                    
                    selectedLatLng = { lat: latLng.getLat(), lng: latLng.getLng() };
                    selectedAddress = '';
                    document.getElementById('selectedInfo').textContent = '🔄 正在获取地址...';
                    
                    // 调用 Web Service API 获取地址
                    fetchAddress(latLng.getLat(), latLng.getLng());
                });
            }, 100);
        }

        function confirmLocation() {
            if (!selectedLatLng) {
                showCustomAlert('warning', '提示', '请先选择位置');
                return;
            }
            
            // 后台保存坐标，前端只显示地址
            document.getElementById('foundAddress').value = `${selectedLatLng.lat},${selectedLatLng.lng}`;
            document.getElementById('foundLocation').value = selectedAddress || '已选择位置';
            
            closeLocationModal();
        }

        function closeLocationModal() {
            const modal = document.getElementById('locationModal');
            if (modal) modal.remove();
            map = null;
            selectedLatLng = null;
            selectedAddress = '';
            marker = null;
        }

        // 照片预览和上传
        document.getElementById('photoFiles')?.addEventListener('change', async function(e) {
            const files = e.target.files;
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = '';
            uploadedPhotos = [];
            
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch(`${API_BASE}/traffic/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    
                    if (data.success && data.url) {
                        uploadedPhotos.push(data.url);
                        
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.className = 'photo-item';
                            img.src = e.target.result;
                            img.onclick = () => viewPhoto(e.target.result);
                            preview.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    }
                } catch (error) {
                    console.error('上传失败:', error);
                }
            }
        });

        // 初始化
        window.onload = function() {
            loadOrders();
            
            // 设置默认时间为当前时间
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('foundTime').value = now.toISOString().slice(0, 16);
        };
    </script>
</body>
