<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能拖车救援系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #0066ff;
            --bg-color: #0a0e1a;
            --card-bg: rgba(16, 28, 48, 0.9);
            --text-color: #e0f7ff;
            --accent-color: #ff6b35;
            --success-color: #00ff88;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 50%, #0a0e1a 100%);
            color: var(--text-color);
            min-height: 100vh;
        }
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            padding-bottom: 80px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(10, 14, 26, 0.95);
            border-top: 1px solid rgba(0, 240, 255, 0.3);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a6d7e;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-text { font-size: 11px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        /* 首页样式 */
        .hero-section {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.2), rgba(0, 240, 255, 0.1));
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }
        .hero-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-desc {
            font-size: 13px;
            color: #5a6d7e;
            margin-bottom: 20px;
        }
        .tow-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-color), #ff8c00);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
            transition: all 0.3s;
        }
        .tow-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .feature-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .feature-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.3), rgba(0, 240, 255, 0.2));
        }
        .feature-icon svg { width: 28px; height: 28px; fill: var(--primary-color); }
        .feature-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .feature-desc { font-size: 11px; color: #5a6d7e; }
        
        /* 订单页面样式 */
        .order-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .filter-item {
            padding: 8px 20px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: #5a6d7e;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-item.active {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: #fff;
        }
        .order-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .order-card:active {
            transform: scale(0.98);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }
        .order-id { font-size: 12px; color: #5a6d7e; }
        .order-status {
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-pending { background: rgba(255, 107, 53, 0.2); color: var(--accent-color); }
        .status-processing { background: rgba(0, 240, 255, 0.2); color: var(--primary-color); }
        .status-completed { background: rgba(0, 255, 136, 0.2); color: var(--success-color); }
        .order-route {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .route-point {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .route-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-color);
        }
        .route-dot.destination {
            background: var(--accent-color);
        }
        .route-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-price { font-size: 18px; font-weight: bold; color: var(--accent-color); }
        .order-time { font-size: 12px; color: #5a6d7e; }
        
        /* 个人中心样式 */
        .profile-header {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar svg { width: 40px; height: 40px; fill: #fff; }
        .user-name { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .user-level {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #5a6d7e; }
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 204, 106, 0.1));
            border: 2px solid var(--success-color);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }
        .balance-label { font-size: 14px; color: var(--success-color); margin-bottom: 10px; }
        .balance-value { font-size: 36px; font-weight: bold; color: var(--success-color); margin-bottom: 20px; }
        .recharge-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
            border: none;
            border-radius: 12px;
            color: #0a0e1a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.98);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }
        .modal.active { display: block; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            margin-bottom: 20px;
        }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.2);
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 18px;
        }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; color: #5a6d7e; margin-bottom: 8px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            padding: 12px 15px;
            color: var(--text-color);
            font-size: 14px;
        }
        .location-picker {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .location-btn {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .location-btn.active {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border-color: transparent;
        }
        .map-container {
            height: 300px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(0, 240, 255, 0.3);
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-color), #ff8c00);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* 提示框 */
        .alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 30px;
            z-index: 3000;
            min-width: 320px;
            text-align: center;
        }
        .alert.success { border-color: var(--success-color); }
        .alert.error { border-color: var(--accent-color); }
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2999;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 首页 -->
        <div class="page active" id="homePage">
            <div class="hero-section">
                <div class="hero-title">🚗 专业拖车救援</div>
                <div class="hero-desc">24 小时待命 · 快速响应 · 安全可靠</div>
                <button class="tow-btn" onclick="openRescueModal()">
                    🆘 立即呼叫拖车
                </button>
            </div>

            <div class="section-title">服务优势</div>
            <div class="feature-grid">
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    </div>
                    <div class="feature-title">快速响应</div>
                    <div class="feature-desc">平均 30 分钟到达</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    </div>
                    <div class="feature-title">安全可靠</div>
                    <div class="feature-desc">专业团队操作</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <div class="feature-title">价格透明</div>
                    <div class="feature-desc">明码标价无隐形</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.11 0-1.99.89-1.99 2L2 22l4-4h14c1.11 0 2-.89 2-2V4c0-1.11-.89-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
                    </div>
                    <div class="feature-title">在线客服</div>
                    <div class="feature-desc">24 小时在线支持</div>
                </div>
            </div>

            <div class="section-title">收费标准</div>
            <div class="service-card" style="background:var(--card-bg);border:1px solid rgba(0,240,255,0.2);border-radius:15px;padding:15px;margin-bottom:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-size:15px;font-weight:bold;margin-bottom:5px;">市区拖车</div>
                        <div style="font-size:12px;color:#5a6d7e;">10 公里以内</div>
                    </div>
                    <div style="font-size:18px;font-weight:bold;color:var(--accent-color);">¥200</div>
                </div>
            </div>
            <div class="service-card" style="background:var(--card-bg);border:1px solid rgba(0,240,255,0.2);border-radius:15px;padding:15px;margin-bottom:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-size:15px;font-weight:bold;margin-bottom:5px;">郊区拖车</div>
                        <div style="font-size:12px;color:#5a6d7e;">10-30 公里</div>
                    </div>
                    <div style="font-size:18px;font-weight:bold;color:var(--accent-color);">¥400</div>
                </div>
            </div>
            <div class="service-card" style="background:var(--card-bg);border:1px solid rgba(0,240,255,0.2);border-radius:15px;padding:15px;margin-bottom:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-size:15px;font-weight:bold;margin-bottom:5px;">长途拖车</div>
                        <div style="font-size:12px;color:#5a6d7e;">30 公里以上</div>
                    </div>
                    <div style="font-size:18px;font-weight:bold;color:var(--accent-color);">¥8/公里</div>
                </div>
            </div>
        </div>

        <!-- 订单页面 -->
        <div class="page" id="ordersPage">
            <div class="order-filter">
                <div class="filter-item active" onclick="filterOrders('all', this)">全部订单</div>
                <div class="filter-item" onclick="filterOrders('pending', this)">待处理</div>
                <div class="filter-item" onclick="filterOrders('processing', this)">进行中</div>
                <div class="filter-item" onclick="filterOrders('completed', this)">已完成</div>
            </div>
            <div id="ordersList"></div>
        </div>

        <!-- 个人中心页面 -->
        <div class="page" id="profilePage">
            <div class="profile-header">
                <div class="avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="profile-info">
                    <div class="user-name" id="userName">用户 8829</div>
                    <span class="user-level" id="userLevel">VIP 会员</span>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="totalOrders">28</div>
                    <div class="stat-label">累计救援</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalSpent">¥5,680</div>
                    <div class="stat-label">总消费</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="userPoints">3,200</div>
                    <div class="stat-label">积分</div>
                </div>
            </div>
            <div class="balance-card">
                <div class="balance-label">账户余额</div>
                <div class="balance-value" id="userBalance">¥ 1,286.00</div>
                <button class="recharge-btn" onclick="openRechargeModal()">立即充值</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-text">首页</span>
        </div>
        <div class="nav-item" onclick="switchPage('orders')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="nav-text">订单</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span class="nav-text">我的</span>
        </div>
    </div>

    <!-- 救援申请弹窗 -->
    <div class="modal" id="rescueModal">
        <div class="modal-header">
            <span class="modal-title">🚗 呼叫拖车</span>
            <button class="modal-close" onclick="closeModal('rescueModal')">×</button>
        </div>
        
        <div class="form-group">
            <label class="form-label">选择定位方式</label>
            <div class="location-picker">
                <button class="location-btn active" onclick="setLocationType('current', this)">
                    📍 当前位置
                </button>
                <button class="location-btn" onclick="setLocationType('map', this)">
                    🗺️ 地图选点
                </button>
                <button class="location-btn" onclick="setLocationType('manual', this)">
                    ✏️ 手动输入
                </button>
            </div>
        </div>

        <!-- 地图选点 -->
        <div id="mapSection" style="display:none;">
            <div class="map-container" id="locationMap"></div>
            <div class="form-group">
                <label class="form-label">已选位置</label>
                <input type="text" class="form-input" id="mapLocation" placeholder="点击地图选择位置" readonly>
            </div>
        </div>

        <!-- 当前位置/手动输入 -->
        <div id="inputSection">
            <div class="form-group">
                <label class="form-label">📍 当前位置</label>
                <input type="text" class="form-input" id="currentLocation" placeholder="请输入当前位置" value="北京市朝阳区建国路 88 号">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">🎯 目的地（可选）</label>
            <input type="text" class="form-input" id="destination" placeholder="请输入拖车目的地">
        </div>

        <div class="form-group">
            <label class="form-label">🚗 车辆信息</label>
            <input type="text" class="form-input" id="vehiclePlate" placeholder="车牌号" value="京 A·88888">
        </div>

        <div class="form-group">
            <label class="form-label">📝 问题描述</label>
            <textarea class="form-textarea" id="problemDesc" placeholder="请描述车辆问题" rows="3">车辆在路边突然熄火，无法启动</textarea>
        </div>

        <button class="submit-btn" onclick="submitRescue()">立即呼叫拖车</button>
    </div>

    <!-- 充值弹窗 -->
    <div class="modal" id="rechargeModal">
        <div class="modal-header">
            <span class="modal-title">账户充值</span>
            <button class="modal-close" onclick="closeModal('rechargeModal')">×</button>
        </div>
        <div class="form-group">
            <label class="form-label">充值金额</label>
            <select class="form-select" id="rechargeAmount">
                <option value="50">¥50 (赠送¥5)</option>
                <option value="100">¥100 (赠送¥15)</option>
                <option value="200">¥200 (赠送¥40)</option>
                <option value="300">¥300 (赠送¥60)</option>
                <option value="500">¥500 (赠送¥100)</option>
                <option value="1000">¥1000 (赠送¥200)</option>
            </select>
        </div>
        <button class="submit-btn" onclick="submitRecharge()">确认充值</button>
    </div>

    <!-- 提示框 -->
    <div class="alert-overlay" id="alertOverlay" style="display:none;"></div>
    <div class="alert" id="alertBox" style="display:none;">
        <h3 id="alertTitle">提示</h3>
        <p id="alertMessage" style="margin:15px 0;"></p>
        <button class="submit-btn" onclick="hideAlert()" style="margin-top:10px;">确定</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentFilter = 'all';
        let locationType = 'current';
        let map = null;
        let marker = null;

        // 页面切换
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(page + 'Page').classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (page === 'orders') loadOrders();
            if (page === 'profile') loadProfile();
        }

        // 打开救援申请
        function openRescueModal() {
            document.getElementById('rescueModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            if (map) {
                map.remove();
                map = null;
            }
        }

        // 设置定位方式
        function setLocationType(type, btn) {
            locationType = type;
            document.querySelectorAll('.location-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const mapSection = document.getElementById('mapSection');
            const inputSection = document.getElementById('inputSection');

            if (type === 'map') {
                mapSection.style.display = 'block';
                inputSection.style.display = 'none';
                initMap();
            } else {
                mapSection.style.display = 'none';
                inputSection.style.display = 'block';
                if (map) {
                    map.remove();
                    map = null;
                }
            }
        }

        // 初始化地图
        function initMap() {
            if (map) return;

            // 默认北京位置
            map = L.map('locationMap').setView([39.9042, 116.4074], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            marker = L.marker([39.9042, 116.4074], {
                draggable: true
            }).addTo(map);

            marker.on('dragend', function() {
                const latlng = marker.getLatLng();
                document.getElementById('mapLocation').value = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
            });

            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                document.getElementById('mapLocation').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            });

            document.getElementById('mapLocation').value = '39.904200, 116.407400';
        }

        // 获取当前位置
        function submitRescue() {
            let location;
            if (locationType === 'map') {
                location = document.getElementById('mapLocation').value;
            } else {
                location = document.getElementById('currentLocation').value;
            }

            const vehiclePlate = document.getElementById('vehiclePlate').value;
            const destination = document.getElementById('destination').value;
            const problemDesc = document.getElementById('problemDesc').value;

            if (!location) {
                showAlert('error', '提示', '请选择或输入位置');
                return;
            }

            submitOrder(location, destination, vehiclePlate, problemDesc);
        }

        // 提交订单
        async function submitOrder(location, destination, vehiclePlate, problemDesc) {
            try {
                const res = await fetch(`${API_BASE}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_type: 'tow',
                        current_location: location,
                        destination: destination,
                        vehicle_plate: vehiclePlate,
                        problem_description: problemDesc
                    })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('success', '提交成功', '拖车申请已提交！\n救援人员会尽快联系您。', () => {
                        closeModal('rescueModal');
                        switchPage('orders');
                    });
                } else {
                    showAlert('error', '提交失败', data.error);
                }
            } catch (error) {
                showAlert('error', '错误', '网络错误，请稍后重试');
            }
        }

        // 加载订单
        async function loadOrders() {
            try {
                const res = await fetch(`${API_BASE}/api/orders?status=${currentFilter}`);
                const data = await res.json();
                
                const container = document.getElementById('ordersList');
                if (data.orders.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#5a6d7e;padding:40px;">暂无订单</p>';
                    return;
                }

                container.innerHTML = data.orders.map(order => `
                    <div class="order-card" onclick="showOrderDetail('${order.order_no}')">
                        <div class="order-header">
                            <span class="order-id">${order.order_no}</span>
                            <span class="order-status status-${order.status}">${order.status_text}</span>
                        </div>
                        <div class="order-route">
                            <div class="route-point">
                                <div class="route-dot"></div>
                                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${order.current_location || '未知位置'}</span>
                            </div>
                        </div>
                        ${order.destination ? `
                        <div class="order-route">
                            <div class="route-point">
                                <div class="route-dot destination"></div>
                                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${order.destination}</span>
                            </div>
                        </div>
                        ` : ''}
                        <div class="order-footer">
                            <span class="order-price">¥${order.price}</span>
                            <span class="order-time">${new Date(order.created_at).toLocaleString('zh-CN')}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载订单失败:', error);
            }
        }

        // 显示订单详情
        function showOrderDetail(orderNo) {
            showAlert('info', '订单详情', `订单号：${orderNo}\n\n如需查看详细信息或联系客服，请前往个人中心。`);
        }

        // 订单筛选
        function filterOrders(status, el) {
            currentFilter = status;
            document.querySelectorAll('.filter-item').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
            loadOrders();
        }

        // 加载用户信息
        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE}/api/users/profile`);
                const data = await res.json();
                
                if (data.user) {
                    document.getElementById('userName').textContent = data.user.username;
                    document.getElementById('userLevel').textContent = data.user.level;
                    document.getElementById('userBalance').textContent = '¥ ' + data.user.balance.toFixed(2);
                    document.getElementById('userPoints').textContent = data.user.points.toLocaleString();
                    document.getElementById('totalOrders').textContent = data.user.total_orders || 28;
                    document.getElementById('totalSpent').textContent = '¥' + (data.user.total_spent || 5680).toLocaleString();
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
            }
        }

        // 打开充值
        function openRechargeModal() {
            document.getElementById('rechargeModal').classList.add('active');
        }

        // 提交充值
        async function submitRecharge() {
            const amount = document.getElementById('rechargeAmount').value;
            
            try {
                const res = await fetch(`${API_BASE}/api/recharge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('success', '充值成功', `成功充值¥${amount}${data.bonus > 0 ? '，赠送¥' + data.bonus : ''}！`, () => {
                        closeModal('rechargeModal');
                        loadProfile();
                    });
                } else {
                    showAlert('error', '充值失败', data.error);
                }
            } catch (error) {
                showAlert('error', '错误', '网络错误，请稍后重试');
            }
        }

        // 提示框
        function showAlert(type, title, message, callback) {
            const alert = document.getElementById('alertBox');
            const overlay = document.getElementById('alertOverlay');
            
            alert.className = 'alert ' + type;
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').innerHTML = message.replace(/\n/g, '<br>');
            
            alert.callback = callback;
            alert.style.display = 'block';
            overlay.style.display = 'block';
        }

        function hideAlert() {
            const alert = document.getElementById('alertBox');
            const overlay = document.getElementById('alertOverlay');
            
            alert.style.display = 'none';
            overlay.style.display = 'none';
            
            if (alert.callback) {
                alert.callback();
                alert.callback = null;
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('智能拖车救援系统已加载');
        });
    </script>
</body>
</html>
